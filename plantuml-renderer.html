    const parsedView = showMS ? state.parsed : { ...state.parsed, rawItems: state.parsed.rawItems.filter(it => it.type !== 'milestone') };
    const cn = showCrit ? state.cp.criticalNodes : new Set();
    const ce = showCrit ? state.cp.criticalEdges : new Set();
    svg = buildSVG(parsedView, state.wStart, state.wEnd, state.ppd,
                   state.parsed.closedDates, state.parsed.closedWeekdays, showDeps, cn, ce,
                   state.collapsedSections, showNotes, state.parsed.openOverrides);
  } catch (e) {
    // Render-Fehler: bestehendes SVG NICHT antasten, nur Warnung anzeigen.
    showWarnings([], 'Render-Fehler: ' + (e.message || e));
    return;
  }
  const svgWrap = document.getElementById('svg-wrap');
  svgWrap.innerHTML = svg;

  // Sticky overlays: header row (top) + label column (left)
  const chartSvg = svgWrap.querySelector('svg');
  if (chartSvg) {
    const totalH = +chartSvg.getAttribute('height');
    const totalW = +chartSvg.getAttribute('width');
    const hdrH   = +chartSvg.getAttribute('data-hdrh');
    const labelW = +chartSvg.getAttribute('data-labelw') || 200;

    // Sticky header (top) -- scrolls horizontally, stays at top
    const hdrClone = chartSvg.cloneNode(true);
    hdrClone.setAttribute('viewBox', `0 0 ${totalW} ${hdrH}`);
    hdrClone.setAttribute('width', String(totalW));
    hdrClone.setAttribute('height', String(hdrH));
    hdrClone.setAttribute('overflow', 'hidden');
    hdrClone.style.display = 'block';
    const stickyTop = document.createElement('div');
    stickyTop.style.cssText = `position:sticky;top:0;width:${totalW}px;height:${hdrH}px;` +
      `pointer-events:none;z-index:6;overflow:hidden;`;
    stickyTop.appendChild(hdrClone);
    svgWrap.insertBefore(stickyTop, chartSvg);
    chartSvg.style.marginTop = '-' + hdrH + 'px';

    // Sticky label column (left) -- scrolls vertically, stays at left
    const lblClone = chartSvg.cloneNode(true);
    lblClone.setAttribute('viewBox', `0 0 ${labelW} ${totalH}`);
    lblClone.setAttribute('width', String(labelW));
    lblClone.setAttribute('height', String(totalH));
    lblClone.setAttribute('overflow', 'hidden');
    lblClone.style.display = 'block';
    const stickyLeft = document.createElement('div');
    stickyLeft.style.cssText = `position:sticky;left:0;width:${labelW}px;height:${totalH}px;` +
      `margin-top:-${totalH}px;pointer-events:none;z-index:5;`;
    stickyLeft.appendChild(lblClone);
    svgWrap.appendChild(stickyLeft);
  }

  const days = daysBetween(state.wStart, state.wEnd);
  const bandLabel = ({year:"Jahr",quarter:"Quartal",month:"Monat",kw:"KW",week:"Woche",day:"Tag",projectday:"Projekttag"})[getBands(state.ppd, days, state.parsed?.projectStart?.getFullYear()===1900).bands.at(-1)];
  document.getElementById('zoom-label').textContent =
    `${state.ppd.toFixed(1)} px/Tag · ${bandLabel}`;
}

function showWarnings(warnings, fatalMsg) {
  const b = document.getElementById('warn-banner');
  const hasAny = (warnings && warnings.length > 0) || !!fatalMsg;
  b.replaceChildren();
  if (!hasAny) { b.style.display = 'none'; return; }
  if (fatalMsg) {
    const d = document.createElement('div');
    d.className = 'warn-fatal';
    d.textContent = fatalMsg;
    b.appendChild(d);
  }
  const MAX = 3;
  const shown = (warnings || []).slice(0, MAX);
  for (const w of shown) {
    const rawCut = w.raw && w.raw.length > 50 ? w.raw.slice(0, 50) + '…' : (w.raw || '');
    const prefix = w.lineNum > 0 ? `Zeile ${w.lineNum}: ` : '';
    const d = document.createElement('div');
    d.className = 'warn-row';
    d.textContent = prefix + w.reason + (rawCut ? ' — ' + rawCut : '');
    b.appendChild(d);
  }
  const extra = (warnings || []).length - MAX;
  if (extra > 0) {
    const d = document.createElement('div');
    d.className = 'warn-more';
    d.textContent = `+ ${extra} weitere Warnung${extra === 1 ? '' : 'en'}`;
    b.appendChild(d);
  }
  b.style.display = 'block';
}

function renderSourcePreview(text, warnings) {
  const wrap = document.getElementById('source-preview');
  const pre = document.getElementById('source-preview-pre');
  pre.replaceChildren();
  if (!warnings || warnings.length === 0) {
    wrap.style.display = 'none';
    return;
  }
  const errorLines = new Set(warnings.map(w => w.lineNum).filter(n => n > 0));
  const lines = text.split('\n');
  const frag = document.createDocumentFragment();
  for (let i = 0; i < lines.length; i++) {
    const n = i + 1;
    const div = document.createElement('div');
    div.className = errorLines.has(n) ? 'src-line src-line-error' : 'src-line';
    div.dataset.line = String(n);
    const ln = document.createElement('span');
    ln.className = 'src-ln';
    ln.textContent = String(n);
    const txt = document.createElement('span');
    txt.className = 'src-txt';
    txt.textContent = lines[i] || ' ';
    div.appendChild(ln);
    div.appendChild(txt);
    frag.appendChild(div);
  }
  pre.appendChild(frag);
  wrap.style.display = 'block';
  const firstError = pre.querySelector('.src-line-error');
  if (firstError) firstError.scrollIntoView({ block: 'center' });
}

function processInput(text) {
  if (!text.trim()) {
    const svgWrap = document.getElementById('svg-wrap');
    svgWrap.replaceChildren();
    showWarnings([], null);
    renderSourcePreview('', []);
    state.parsed = null;
    state.cp = { criticalNodes: new Set(), criticalEdges: new Set(), cycleDetected: false };
    return;
  }
  // Komplette Pipeline in lokalen Variablen — wird erst nach Erfolg atomar in den State übernommen.
  // Bei jedem Fehler in dieser Kette bleibt der zuletzt erfolgreiche Stand (state.parsed, state.cp,
  // wStart/wEnd/ppd) und damit das bestehende SVG vollständig unangetastet.
  let nextParsed, nextCp, nextStart, nextEnd, nextPpd, warnings;
  try {
    nextParsed = parsePlantUML(text);
    resolveItems(nextParsed.rawItems, nextParsed.closedDates, nextParsed.closedWeekdays, nextParsed.openOverrides);
    nextCp = computeCriticalPath(nextParsed.rawItems);
    warnings = [...(nextParsed.parseWarnings || [])];
    if (nextCp.cycleDetected) {
      const cn = nextCp.cycleDetails || [];
      const namesList = cn.map(d => `[${d.name}]`).join(', ');
      const lineNums = cn.map(d => d.sourceLine).filter(n => n > 0);
      const firstLine = lineNums.length ? Math.min(...lineNums) : 0;
      warnings.push({
        lineNum: firstLine, raw: '',
        reason: 'Zyklus im Abhängigkeitsgraph (kritischer Pfad nicht bestimmbar): ' + namesList,
      });
    }
    for (const it of nextParsed.rawItems) {
      if (it.parseError) {
        warnings.push({
          lineNum: it.sourceLine || 0, raw: '',
          reason: `Syntaxfehler in Task '[${it.name}]'`,
        });
      }
    }
    if (nextParsed.rawItems._unresolvedCycle?.length) {
      warnings.push({
        lineNum: 0, raw: '',
        reason: `Zyklus im Abhängigkeitsgraph (unresolved): ${nextParsed.rawItems._unresolvedCycle.map(n => `[${n}]`).join(' → ')}`,
      });
    }
    if (nextParsed.rawItems._unresolvedDetails?.length) {
      for (const d of nextParsed.rawItems._unresolvedDetails) {
        warnings.push({
          lineNum: d.sourceLine || 0, raw: '',
          reason: `Abhängigkeit '[${d.afterTask}]' für '[${d.name}]' nicht auflösbar`,
        });
      }
    }
    if (nextCp.isolatedItems?.length) {
      for (const i of nextCp.isolatedItems) {
        warnings.push({
          lineNum: i.sourceLine || 0, raw: '',
          reason: `Isoliertes Item '[${i.name}]' — kein Vorgänger, kein Nachfolger, keine Abhängigkeit. Beabsichtigt?`,
        });
      }
    }
    if (nextCp.planConflicts?.length) {
      for (const c of nextCp.planConflicts) {
        warnings.push({
          lineNum: c.sourceLine || 0, raw: '',
          reason: `Plan-Konflikt: '[${c.to}]' beginnt am ${dateToISO(c.toStart)}, aber Vorgänger '[${c.from}]' endet erst am ${dateToISO(c.fromEnd)}.`,
        });
      }
    }
    // Lint: kalendarischer Offset bei aktiven closed-Direktiven — Hinweis auf `working days`
    // nur, wenn der Offset-Zeitraum tatsächlich einen closed-Tag enthält. Reiner Werktags-
    // Offset (z. B. Mo→Mi mit aktiven sat/sun closed, aber kein closed-Tag im Mo→Mi-Bereich)
    // ist Calendar und Working semantisch identisch → keine Warnung.
    if (nextParsed.closedDates.size || nextParsed.closedWeekdays.size) {
      const taskByName = {};
      for (const it of nextParsed.rawItems) if (it.name) taskByName[it.name] = it;
      for (const it of nextParsed.rawItems) {
        if (it.type !== 'task' || !it.afterTask || (it.offset || 0) <= 0 || it.offsetWorkDays) continue;
        const dep = taskByName[it.afterTask];
        const depRef = dep ? (dep.type === 'milestone' ? dep.date : (it.afterWhat === 'start' ? dep.start : dep.end)) : null;
        if (!depRef) continue;
        let hasClosed = false;
        for (let i = 1; i <= it.offset; i++) {
          const day = addDays(depRef, i);
          const iso = dateToISO(day);
          const dow = day.getDay();
          const overrideOpen = nextParsed.openOverrides && nextParsed.openOverrides.has(iso);
          if (!overrideOpen && (nextParsed.closedWeekdays.has(dow) || nextParsed.closedDates.has(iso))) {
            hasClosed = true; break;
          }
        }
        if (!hasClosed) continue;
        warnings.push({
          lineNum: it.sourceLine || 0, raw: '',
          reason: `'[${it.name}]': Offset von ${it.offset} Tagen überspannt closed-Tage (PlantUML-Spec: Calendar-Offset). Für Arbeitstage stattdessen 'starts ${it.offset} working days after …' verwenden.`,
        });
      }
    }
    const win = autoWindow(nextParsed.rawItems);
    nextStart = win.start;
    nextEnd = win.end;
    nextPpd = autoZoom(nextStart, nextEnd, nextParsed.rawItems);
    // NaN-Date / Invalid Date kaskadiert sonst stumm zu kaputten SVG-Koordinaten — hier explizit abfangen.
    if (!(nextStart instanceof Date) || isNaN(nextStart.getTime()) ||
        !(nextEnd   instanceof Date) || isNaN(nextEnd.getTime())) {
      throw new Error('Ungültige Datums-Werte (Invalid Date) in der Quelle');
    }
    if (!Number.isFinite(nextPpd) || nextPpd <= 0) {
      throw new Error('Ungültiger Zoom-Faktor (ppd) berechnet');
    }
  } catch (e) {
    // Pipeline-Fehler: bestehendes SVG und State bleiben unangetastet.
    showWarnings([], 'Schwerer Verarbeitungs-Fehler: ' + (e.message || e));
    renderSourcePreview(text, []);
    return;
  }
  // Atomar in den State übernehmen — entweder alle Felder gemeinsam oder gar nicht.
  state.parsed = nextParsed;
  state.cp = nextCp;
  // Datumsfenster nur im 'auto'-Modus überschreiben — manueller Zoom/Datums-Pick bleibt erhalten.
  if (state.windowMode === 'auto') {
    state.wStart = nextStart;
    state.wEnd = nextEnd;
    state.ppd = state.fitMode ? state.ppd : nextPpd;
  }
  showWarnings(warnings, null);
  renderSourcePreview(text, warnings);
  setDateInputs(state.wStart, state.wEnd);
  // render() / applyFit() sind in sich abgesichert — Render-Fehler lassen das alte SVG stehen.
  if (state.fitMode) applyFit();
  else render();
}

// ─── Export ───────────────────────────────────────────────────────────────────

function dl(blob, name) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1500);
}

function visibleSVG() {
  const wrap = document.getElementById('svg-wrap');
  // querySelector finds the first SVG which may be the sticky header clone; get the direct child SVG
  const el = wrap.querySelector(':scope > svg');
  if (!el) return null;
  const totalW = +el.getAttribute('width');
  const vh = +el.getAttribute('height');
  // Always export full diagram from x=0; 1px padding so strokes at edges aren't half-clipped
  const PAD = 1;
  const clone = el.cloneNode(true);
  clone.setAttribute('viewBox', `${-PAD} ${-PAD} ${totalW + 2 * PAD} ${vh + 2 * PAD}`);
  clone.setAttribute('width', totalW + 2 * PAD);
  clone.setAttribute('height', vh + 2 * PAD);
  clone.style.marginTop = '';
  return clone;
}

function exportSVG() {
  const el = visibleSVG();
  if (!el) return;
  const str = new XMLSerializer().serializeToString(el);
  dl(new Blob([str], { type: 'image/svg+xml;charset=utf-8' }), 'gantt.svg');
}

function exportPNG() {
  const el = visibleSVG();
  if (!el) return;
  const W = +el.getAttribute('width'), H = +el.getAttribute('height'), S = 4;
  const str = new XMLSerializer().serializeToString(el);
  const blob = new Blob([str], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => {
    const c = Object.assign(document.createElement('canvas'), { width: W*S, height: H*S });
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W*S, H*S);
    ctx.scale(S, S); ctx.drawImage(img, 0, 0);
    URL.revokeObjectURL(url);
    c.toBlob(pb => dl(pb, 'gantt.png'), 'image/png');
  };
  img.onerror = () => showWarnings([], 'PNG-Export fehlgeschlagen: SVG enthält möglicherweise externe Ressourcen.');
  img.src = url;
}

let _fontCSS = null;

async function loadEmbeddedFont() {
  if (_fontCSS !== null) return _fontCSS;
  const cached = await idbGet('fontCSS_v2');
  if (cached) { _fontCSS = cached; return _fontCSS; }
  try {
    const css = await fetch('https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap').then(r => r.text());
    const urls = [...css.matchAll(/url\(([^)]+\.woff2[^)]*)\)/g)].map(m => m[1].replace(/['"]/g, ''));
    let result = css;
    const replacements = await Promise.all(urls.map(async url => {
      const buf = await fetch(url).then(r => r.arrayBuffer());
      const bytes = new Uint8Array(buf);
      let raw = '';
      for (let i = 0; i < bytes.length; i += 8192) raw += String.fromCharCode(...bytes.subarray(i, i + 8192));
      const b64 = btoa(raw);
      return { url, b64 };
    }));
    for (const { url, b64 } of replacements) {
      result = result.replace(url, `data:font/woff2;base64,${b64}`);
    }
    _fontCSS = result;
    await idbSet('fontCSS_v2', result);
  } catch(e) {
    _fontCSS = '';
  }
  return _fontCSS;
}

async function exportPDF() {
  const wrap = document.getElementById('svg-wrap');
  const el = wrap.querySelector(':scope > svg');
  if (!el) return;
  const totalW = +el.getAttribute('width');
  const totalH = +el.getAttribute('height');
  const clone = el.cloneNode(true);
  clone.setAttribute('viewBox', `0 0 ${totalW} ${totalH}`);
  clone.setAttribute('width', '287mm');
  clone.setAttribute('height', '200mm');
  clone.setAttribute('preserveAspectRatio', 'xMidYMid meet');
  clone.style.marginTop = '';
  const fontCSS = await loadEmbeddedFont();
  const title = (state.parsed && state.parsed.title) || '';
  const svgStr = new XMLSerializer().serializeToString(clone);
  const win = window.open('', '_blank');
  if (!win) { showWarnings([], 'Popup wurde vom Browser blockiert. Bitte Popups für diese Seite erlauben.'); return; }
  win.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${title || 'Gantt'}</title><style>@page{size:A4 landscape;margin:5mm}*{margin:0;padding:0}body{width:287mm;height:200mm;overflow:hidden}${fontCSS}</style></head><body>${svgStr}<script>window.print()<\/script></body></html>`);
  win.document.close();
}

// ─── IDB helpers ──────────────────────────────────────────────────────────────

function idbOpen() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('gantt-renderer', 3);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('kv')) db.createObjectStore('kv');
      // history-Store war ein verworfener Versuch (F4) — aufräumen, falls aus v2 vorhanden.
      if (db.objectStoreNames.contains('history')) db.deleteObjectStore('history');
    };
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => rej(e.target.error);
  });
}
async function idbGet(key) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const req = db.transaction('kv').objectStore('kv').get(key);
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => rej(e.target.error);
  });
}
async function idbSet(key, val) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const req = db.transaction('kv','readwrite').objectStore('kv').put(val, key);
    req.onsuccess = () => res();
    req.onerror   = e => rej(e.target.error);
  });
}

// ─── File Loader ──────────────────────────────────────────────────────────────

let dirHandle = null;
let currentFileHandle = null;
let lastModified = null;
let autoReloadTimer = null;

function startAutoReload() {
  if (autoReloadTimer) return;
  autoReloadTimer = setInterval(async () => {
    if (!currentFileHandle) return;
    try {
      const file = await currentFileHandle.getFile();
      if (lastModified !== null && file.lastModified !== lastModified) {
        lastModified = file.lastModified;
        processInput(await file.text());
      }
    } catch(e) { console.warn('Auto-Reload Fehler:', e); }
  }, 1000);
}

function stopAutoReload() {
  clearInterval(autoReloadTimer);
  autoReloadTimer = null;
}

async function refreshFileList() {
  const sel = document.getElementById('file-select');
  sel.innerHTML = '<option value="">— Datei wählen —</option>';
  const names = [];
  for await (const [name, handle] of dirHandle.entries())
    if (handle.kind === 'file' && name.endsWith('.puml')) names.push(name);
  names.sort().forEach(name => {
    const opt = document.createElement('option');
    opt.value = name; opt.textContent = name;
    sel.appendChild(opt);
  });
  document.getElementById('file-hint').textContent =
    names.length ? `${names.length} Datei${names.length > 1 ? 'en' : ''} gefunden`
                 : 'Keine .puml-Dateien gefunden';
}

async function loadCurrentFile() {
  if (!currentFileHandle) return;
  try {
    const file = await currentFileHandle.getFile();
    lastModified = file.lastModified;
    processInput(await file.text());
  } catch(e) { showWarnings([], 'Datei konnte nicht gelesen werden: ' + e.message); }
}

async function restoreDir() {
  try {
    const handle = await idbGet('dirHandle');
    if (!handle) return;
    if (await handle.requestPermission({ mode: 'read' }) !== 'granted') return;
    dirHandle = handle;
    await refreshFileList();
    const last = localStorage.getItem('gantt-lastFile');
    const sel = document.getElementById('file-select');
    if (last && [...sel.options].some(o => o.value === last)) {
      sel.value = last;
      currentFileHandle = await dirHandle.getFileHandle(last);
      await loadCurrentFile();
    }
  } catch(e) { /* kein gespeicherter Ordner */ }
}

// ─── Init ─────────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {

  restoreDir();
  startAutoReload();

  document.getElementById('btn-pick-dir').addEventListener('click', async () => {
    try {
      dirHandle = await window.showDirectoryPicker({ mode: 'read' });
      await idbSet('dirHandle', dirHandle);
      await refreshFileList();
    } catch(e) { /* abgebrochen */ }
  });

  document.getElementById('file-select').addEventListener('change', async e => {
    const name = e.target.value;
    if (!name || !dirHandle) return;
    localStorage.setItem('gantt-lastFile', name);
    currentFileHandle = await dirHandle.getFileHandle(name);
    // Neue Datei → auto-Modus, sonst würde das alte manuelle Fenster auf das neue Projekt angewandt.
    state.windowMode = 'auto';
    await loadCurrentFile();
  });

  document.getElementById('btn-reload').addEventListener('click', loadCurrentFile);

  document.getElementById('chk-autoreload').addEventListener('change', e => {
    e.target.checked ? startAutoReload() : stopAutoReload();
  });

  document.getElementById('chk-milestones').addEventListener('change', () => render());
  document.getElementById('chk-notes').addEventListener('change', () => render());
  document.getElementById('chk-deps').addEventListener('change', () => render());
  document.getElementById('chk-critical').addEventListener('change', () => render());
  document.getElementById('btn-zoom-100').addEventListener('click', () => {
    state.fitMode = false;
    state.ppd = BAR_H;
    render();
  });

  document.getElementById('btn-collapse-all').addEventListener('click', () => {
    if (!state.parsed) return;
    for (const it of state.parsed.rawItems) {
      if (it.type === 'section') state.collapsedSections.add(it.name);
    }
    render();
  });
  document.getElementById('btn-expand-all').addEventListener('click', () => {
    state.collapsedSections.clear();
    render();
  });

  document.getElementById('svg-wrap').addEventListener('click', e => {
    const sec = e.target.closest('[data-section-name]');
    if (!sec) return;
    const name = sec.getAttribute('data-section-name');
    if (state.collapsedSections.has(name)) state.collapsedSections.delete(name);
    else state.collapsedSections.add(name);
    render();
  });

  document.getElementById('date-from').addEventListener('change', e => {
    if (e.target.value) { state.wStart = parseDate(e.target.value); state.windowMode = 'manual'; render(); }
  });
  document.getElementById('date-to').addEventListener('change', e => {
    if (e.target.value) { state.wEnd = parseDate(e.target.value); state.windowMode = 'manual'; render(); }
  });

  document.getElementById('btn-zoom-in').addEventListener('click', () => {
    if (!state.ppd) return;
    state.fitMode = false; state.ppd = Math.min(200, state.ppd * 1.35); render();
  });
  document.getElementById('btn-zoom-out').addEventListener('click', () => {
    if (!state.ppd) return;
    state.fitMode = false; state.ppd = Math.max(0.2, state.ppd / 1.35); render();
  });
  document.getElementById('btn-fit-page').addEventListener('click', fitToPage);

  document.getElementById('btn-export-svg').addEventListener('click', exportSVG);
  document.getElementById('btn-export-png').addEventListener('click', exportPNG);
  document.getElementById('btn-export-pdf').addEventListener('click', exportPDF);

  // Panel collapse
  const panelLeft = document.getElementById('panel-left');
  const btnCollapse = document.getElementById('btn-collapse');
  let collapsed = false, savedW = panelLeft.offsetWidth;

  btnCollapse.addEventListener('click', e => {
    e.stopPropagation();
    collapsed = !collapsed;
    if (collapsed) {
      savedW = panelLeft.offsetWidth;
      panelLeft.style.width   = '0';
      panelLeft.style.minWidth = '0';
      panelLeft.style.padding  = '0';
      panelLeft.style.overflow = 'hidden';
    } else {
      panelLeft.style.width   = savedW + 'px';
      panelLeft.style.minWidth = '';
      panelLeft.style.padding  = '';
      panelLeft.style.overflow = '';
    }
    btnCollapse.textContent = collapsed ? '▶' : '◀';
    btnCollapse.title = collapsed ? 'Panel ausklappen' : 'Panel einklappen';
  });

  // Nach Abschluss der width-Transition des linken Panels neu fitten,
  // damit `applyFit` die finale clientWidth des SVG-Wraps liest, nicht die alte.
  panelLeft.addEventListener('transitionend', e => {
    if (e.propertyName === 'width' && state.fitMode) applyFit();
  });

  // Splitter drag
  const splitter = document.getElementById('splitter');
  let dragging = false, startX = 0, startW = 0;

  splitter.addEventListener('mousedown', e => {
    if (e.target === btnCollapse) return;
    dragging = true; startX = e.clientX; startW = panelLeft.offsetWidth;
    splitter.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const w = Math.max(160, Math.min(window.innerWidth * 0.6, startW + e.clientX - startX));
    panelLeft.style.width = w + 'px';
    if (state.fitMode) applyFit();
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    splitter.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });

  // ── Tooltip ──────────────────────────────────────────────────────────────────
  const tip = document.getElementById('gantt-tooltip');

  function fmtTipDate(iso) {
    const d = parseDate(iso);
    return `${DOW_LONG[d.getDay()]}, ${d.getDate()}. ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
  }

  const svgWrap = document.getElementById('svg-wrap');
  svgWrap.addEventListener('mousemove', e => {
    const noteEl = e.target.closest('[data-note]');
    if (noteEl && !noteEl.closest('[data-name]')) {
      const full = noteEl.getAttribute('data-note');
      tip.replaceChildren();
      const lbl = document.createElement('b');
      lbl.style.cssText = 'font-size:11px;color:#8ab4cc';
      lbl.textContent = 'Notiz';
      tip.appendChild(lbl);
      const ln = (full || '').split('\n');
      for (let i = 0; i < ln.length; i++) {
        if (i > 0) tip.appendChild(document.createElement('br'));
        tip.appendChild(document.createTextNode(ln[i]));
      }
      tip.style.display = 'block';
      const tw = tip.offsetWidth, th = tip.offsetHeight;
      let lx = e.clientX + 16, ly = e.clientY + 12;
      if (lx + tw > window.innerWidth  - 8) lx = e.clientX - tw - 8;
      if (ly + th > window.innerHeight - 8) ly = e.clientY - th - 8;
      tip.style.left = lx + 'px'; tip.style.top = ly + 'px';
      return;
    }
    const el = e.target.closest('[data-name]');
    if (!el) { tip.style.display = 'none'; return; }
    const name = el.getAttribute('data-name');
    const sec  = el.getAttribute('data-section');
    tip.replaceChildren();
    const b = document.createElement('b');
    b.textContent = name;
    tip.appendChild(b);
    if (sec) {
      const sp = document.createElement('span');
      sp.style.cssText = 'display:block;font-size:11px;color:#8ab4cc;margin-bottom:5px';
      sp.textContent = sec;
      tip.appendChild(sp);
    }
    if (el.dataset.ms) {
      tip.appendChild(document.createTextNode(`Datum: ${fmtTipDate(el.dataset.ms)}`));
    } else {
      const days = daysBetween(parseDate(el.dataset.start), parseDate(el.dataset.end));
      const weeks = Math.ceil(days / 7);
      tip.appendChild(document.createTextNode(`Start: ${fmtTipDate(el.dataset.start)}`));
      tip.appendChild(document.createElement('br'));
      tip.appendChild(document.createTextNode(`Ende:  ${fmtTipDate(el.dataset.end)}`));
      tip.appendChild(document.createElement('br'));
      tip.appendChild(document.createTextNode(`Dauer: ${days} Tage (${weeks} ${weeks === 1 ? 'Woche' : 'Wochen'})`));
      if (el.dataset.pct) {
        tip.appendChild(document.createElement('br'));
        tip.appendChild(document.createTextNode(`Fortschritt: ${el.dataset.pct}%`));
      }
    }
    if (el.dataset.preds) {
      tip.appendChild(document.createElement('br'));
      tip.appendChild(document.createTextNode(`Vorgänger: ${el.dataset.preds.split('|').map(n => `[${n}]`).join(', ')}`));
    }
    if (el.dataset.succs) {
      tip.appendChild(document.createElement('br'));
      tip.appendChild(document.createTextNode(`Nachfolger: ${el.dataset.succs.split('|').map(n => `[${n}]`).join(', ')}`));
    }
    // Notiz am Task/Milestone (data-note auf dem <g>) anhängen — funktioniert auch bei ausgeblendetem Notizen-Toggle.
    const note = el.getAttribute('data-note');
    if (note) {
      tip.appendChild(document.createElement('br'));
      const noteLbl = document.createElement('span');
      noteLbl.style.cssText = 'display:block;font-size:11px;color:#8ab4cc;margin-top:5px';
      noteLbl.textContent = 'Notiz';
      tip.appendChild(noteLbl);
      const ln = note.split('\n');
      for (let i = 0; i < ln.length; i++) {
        if (i > 0) tip.appendChild(document.createElement('br'));
        tip.appendChild(document.createTextNode(ln[i]));
      }
    }
    tip.style.display = 'block';
    const tw = tip.offsetWidth, th = tip.offsetHeight;
    let lx = e.clientX + 16, ly = e.clientY + 12;
    if (lx + tw > window.innerWidth  - 8) lx = e.clientX - tw - 8;
    if (ly + th > window.innerHeight - 8) ly = e.clientY - th - 8;
    tip.style.left = lx + 'px';
    tip.style.top  = ly + 'px';
  });
  svgWrap.addEventListener('mouseleave', () => { tip.style.display = 'none'; });

  window.addEventListener('resize', () => {
    if (state.fitMode) applyFit();
  });

  // Ctrl+Mausrad = Zoom, plain Mausrad = vertikaler Browser-Scroll
  svgWrap.addEventListener('wheel', e => {
    if (!state.ppd || !e.ctrlKey) return;
    e.preventDefault();
    state.fitMode = false;
    const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
    const newPpd = Math.max(0.2, Math.min(200, state.ppd * factor));
    // Tag-Position unter dem Cursor vor dem Zoom
    const cursorDay = (e.offsetX + svgWrap.scrollLeft) / state.ppd;
    state.ppd = newPpd;
    render();
    // Scroll so anpassen, dass derselbe Tag unter dem Cursor bleibt
    svgWrap.scrollLeft = cursorDay * newPpd - e.offsetX;
  }, { passive: false });
});
</script>
