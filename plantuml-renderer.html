<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlantUML Gantt Renderer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Source Sans 3', system-ui, sans-serif; font-size: 13px; height: 100vh; display: flex; flex-direction: column; background: #eef1f4; overflow: hidden; }

#app { display: flex; flex: 1; overflow: hidden; }

#panel-left {
  width: 290px; min-width: 160px; max-width: 60%;
  display: flex; flex-direction: column;
  background: #fff;
  padding: 12px; gap: 8px; overflow-y: auto;
  flex-shrink: 0;
}

#splitter {
  width: 5px; min-width: 5px; cursor: col-resize;
  background: #d0d7de; flex-shrink: 0;
  transition: background 0.15s;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px; overflow: visible; position: relative;
}
#splitter:hover, #splitter.dragging { background: #2980b9; }
#btn-collapse {
  position: absolute; top: 12px;
  width: 18px; height: 18px; border-radius: 50%;
  background: #2980b9; color: #fff; border: none;
  font-size: 9px; line-height: 1; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 1px 4px rgba(0,0,0,0.25);
  z-index: 10; flex-shrink: 0;
}
#btn-collapse:hover { background: #1e6fa0; }
#panel-left { transition: width 0.2s, padding 0.2s; }

#panel-left h2 { font-size: 13px; font-weight: 700; color: #1e3a4c; letter-spacing: 0.02em; }

#file-select {
  width: 100%; padding: 4px 6px; border: 1px solid #d0d7de; border-radius: 4px;
  font-size: 11.5px; color: #1e2d3d; background: #f8fafc; cursor: pointer;
}
#file-hint { font-size: 11px; color: #aaa; text-align: center; padding: 6px 0; }

.section-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  color: #8a9bb0; letter-spacing: 0.06em; margin-top: 4px;
}

.ctrl-row { display: flex; gap: 6px; align-items: center; }
.ctrl-row span { font-size: 11px; color: #666; width: 26px; }

input[type="date"] {
  flex: 1; border: 1px solid #d0d7de; border-radius: 4px;
  padding: 4px 6px; font-size: 11.5px; color: #1e2d3d;
}
input[type="date"]:focus { outline: none; border-color: #2980b9; }

.zoom-row { display: flex; gap: 6px; align-items: center; }
.zoom-btn {
  width: 28px; height: 28px; border: 1px solid #d0d7de; border-radius: 4px;
  background: #f8fafc; cursor: pointer; font-size: 17px; line-height: 1;
  display: flex; align-items: center; justify-content: center; color: #1e2d3d;
  user-select: none;
}
.zoom-btn:hover { background: #eef1f4; }
#zoom-label { font-size: 11px; color: #8a9bb0; flex: 1; text-align: center; }

hr { border: none; border-top: 1px solid #eef1f4; }

.btn {
  width: 100%; padding: 8px; border: none; border-radius: 5px;
  cursor: pointer; font-size: 12px; font-weight: 600;
  transition: background 0.15s; text-align: center;
}
.btn-primary { background: #2980b9; color: #fff; }
.btn-primary:hover { background: #216fa0; }
.btn-secondary { background: #eef1f4; color: #1e2d3d; }
.btn-secondary:hover { background: #dce3e8; }

#panel-right { flex: 1; overflow: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }

#warn-banner {
  flex-shrink: 0; display: none; max-height: 120px; overflow-y: auto;
  background: #fff0f0; color: #c0392b; border-bottom: 1px solid #c0392b;
  padding: 6px 12px; font-size: 12px; line-height: 1.5;
  font-family: ui-monospace, 'SF Mono', Menlo, monospace;
}
#warn-banner .warn-fatal { font-weight: 700; }
#warn-banner .warn-row { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#warn-banner .warn-more { opacity: 0.7; font-style: italic; }

#source-preview {
  display: none; max-height: 220px; overflow: auto;
  border: 1px solid #d0d7de; border-radius: 4px;
  background: #f8fafc; margin-top: 4px;
}
#source-preview pre {
  font-family: ui-monospace, 'SF Mono', Menlo, monospace;
  font-size: 11px; line-height: 1.5; padding: 0; margin: 0;
}
.src-line { display: flex; padding-left: 0; border-left: 2px solid transparent; }
.src-line-error { background: #fff0f0; border-left-color: #c0392b; }
.src-ln {
  display: inline-block; width: 28px; flex-shrink: 0;
  color: #aaa; text-align: right; padding-right: 6px; user-select: none;
}
.src-txt { white-space: pre; color: #1e2d3d; }
.src-line-error .src-txt { color: #c0392b; }

#svg-wrap { background: #fff; border-radius: 6px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); overflow: auto; flex: 1; }

#gantt-tooltip {
  position: fixed; display: none; pointer-events: none; z-index: 9999;
  background: #1a2d3d; color: #e0e8f0; border-radius: 6px;
  padding: 9px 14px; font-size: 12.5px; line-height: 1.7;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4); white-space: nowrap;
}
#gantt-tooltip b { display: block; font-size: 13.5px; color: #fff; margin-bottom: 4px; }
</style>
</head>
<body>
<div id="warn-banner"></div>
<div id="app">

  <div id="panel-left" style="width:290px">
    <h2>PlantUML Gantt Renderer</h2>
    <div style="font-size:10px;color:#aaa;margin-top:-6px;margin-bottom:4px">v26.5.44</div>

    <div class="section-label">Datei</div>
    <button class="btn btn-secondary" id="btn-pick-dir">Ordner wählen …</button>
    <select id="file-select"><option value="">— Datei wählen —</option></select>
    <button class="btn btn-secondary" id="btn-reload">↺ Neu laden</button>
    <label style="font-size:11px;display:flex;align-items:center;gap:5px;cursor:pointer;color:#555">
      <input type="checkbox" id="chk-autoreload" checked> Auto-Reload bei Änderung
    </label>
    <label style="font-size:11px;display:flex;align-items:center;gap:5px;cursor:pointer;color:#555">
      <input type="checkbox" id="chk-milestones" checked> Meilensteine anzeigen
    </label>
    <label style="font-size:11px;display:flex;align-items:center;gap:5px;cursor:pointer;color:#555">
      <input type="checkbox" id="chk-notes" checked> Notizen anzeigen
    </label>
    <label style="font-size:11px;display:flex;align-items:center;gap:5px;cursor:pointer;color:#555">
      <input type="checkbox" id="chk-deps" checked> Abhängigkeiten anzeigen
    </label>
    <label style="font-size:11px;display:flex;align-items:center;gap:5px;cursor:pointer;color:#555">
      <input type="checkbox" id="chk-critical"> Kritischen Pfad hervorheben
    </label>
    <div style="display:flex;gap:4px;margin-top:2px">
      <button class="btn btn-secondary" id="btn-collapse-all" style="font-size:11px;padding:4px 6px">Alle einklappen</button>
      <button class="btn btn-secondary" id="btn-expand-all" style="font-size:11px;padding:4px 6px">Alle ausklappen</button>
    </div>
    <div id="file-hint">(.puml-Dateien)</div>

    <hr>
    <div class="section-label">Zeitfenster</div>
    <div class="ctrl-row"><span>Von</span><input type="date" id="date-from"></div>
    <div class="ctrl-row"><span>Bis</span><input type="date" id="date-to"></div>

    <div class="section-label">Ansicht</div>
    <div class="zoom-row">
      <button class="zoom-btn" id="btn-zoom-out" title="Herauszoomen (oder Strg+Mausrad nach unten)">−</button>
      <button class="zoom-btn" id="btn-zoom-in" title="Hineinzoomen (oder Strg+Mausrad nach oben)">+</button>
      <span id="zoom-label">—</span>
    </div>
    <div style="display:flex;gap:4px;margin-top:2px">
      <button class="btn btn-secondary" id="btn-zoom-100" title="Setzt Zoom auf konstante 14 px/Tag — unabhängig vom Datums-Filter und der Browser-Breite. Identischer Output über Sessions und Maschinen → für reproduzierbaren Export." style="flex:1;font-size:11px;padding:4px 6px">100%</button>
      <button class="btn btn-secondary" id="btn-fit-page" title="Setzt das Datums-Fenster auf alle Tasks, Auto-Zoom auf Browser-Breite. Sticky bei Resize / Splitter-Drag / Panel-Collapse, bis Zoom oder Datums-Filter manuell geändert werden." style="flex:1;font-size:11px;padding:4px 6px">Auto</button>
    </div>

    <hr>
    <button class="btn btn-secondary" id="btn-export-svg">Export SVG</button>
    <button class="btn btn-secondary" id="btn-export-png">Export PNG</button>
    <button class="btn btn-secondary" id="btn-export-pdf">Drucken A4 (PDF)</button>

    <div id="source-preview"><pre id="source-preview-pre"></pre></div>
  </div>

  <div id="splitter"><button id="btn-collapse" title="Panel einklappen">◀</button></div>
  <div id="panel-right">
    <div id="svg-wrap"></div>
  </div>
</div>
<div id="gantt-tooltip"></div>
<script>
// ─── Date Utilities ───────────────────────────────────────────────────────────

function parseDate(str) {
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function addDays(date, n) {
  const d = new Date(date);
  d.setDate(d.getDate() + Math.round(n));
  return d;
}

function parseDuration(num, unit) {
  return unit.toLowerCase().startsWith('week') ? parseInt(num, 10) * 7 : parseInt(num, 10);
}

function isClosedDay(date, closedDates, closedWeekdays, openOverrides, itemPauses, itemPauseWeekdays) {
  const iso = dateToISO(date);
  if (openOverrides && openOverrides.has(iso)) return false;
  if (closedWeekdays.has(date.getDay()) || closedDates.has(iso)) return true;
  if (itemPauses && itemPauses.has(iso)) return true;
  if (itemPauseWeekdays && itemPauseWeekdays.has(date.getDay())) return true;
  return false;
}

function addWorkDays(date, n, closedDates, closedWeekdays, openOverrides, itemPauses, itemPauseWeekdays) {
  const hasPauses = (itemPauses && itemPauses.size) || (itemPauseWeekdays && itemPauseWeekdays.size);
  if (!closedDates.size && !closedWeekdays.size && !hasPauses) return addDays(date, n);
  // Schutz vor Endlosschleife bei NaN: fallback auf addDays.
  if (!Number.isFinite(n)) return addDays(date, n);
  if (n === 0) return new Date(date);
  // Vorwärts (n>0) UND rückwärts (n<0): step-Richtung umkehren, gleiche Skip-Logik.
  let cur = new Date(date);
  const step = n > 0 ? 1 : -1;
  let remaining = Math.abs(n);
  while (remaining > 0) {
    cur = addDays(cur, step);
    if (!isClosedDay(cur, closedDates, closedWeekdays, openOverrides, itemPauses, itemPauseWeekdays)) remaining--;
  }
  return cur;
}

const WEEKDAY_MAP = { monday:1, tuesday:2, wednesday:3, thursday:4, friday:5, saturday:6, sunday:0 };

function daysBetween(a, b) {
  const ua = Date.UTC(a.getFullYear(), a.getMonth(), a.getDate());
  const ub = Date.UTC(b.getFullYear(), b.getMonth(), b.getDate());
  return Math.round((ub - ua) / 86400000);
}

function dateToISO(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}

// ─── Parser ──────────────────────────────────────────────────────────────────

function parsePlantUML(text) {
  // Block-Kommentar /'…'/ vor dem Zeilen-Split entfernen, damit auch
  // mehrzeilige Kommentare zuverlässig verschwinden. Non-greedy.
  let cleaned = text.replace(/\/'[\s\S]*?'\//g, '');

  // Compound-Duration: `N weeks and M days` → `(N*7 + M) days` (Doku-belegt:
  // `[Task] requires 1 week and 4 days`). Vor allem anderen ersetzen, damit alle
  // bestehenden duration-Patterns weiter mit ihrer einfachen `N (days|weeks)`-Form matchen.
  cleaned = cleaned.replace(
    /(\d+)\s*(weeks?)\s+and\s+(\d+)\s*(days?)/gi,
    (_m, n1, _u1, n2) => `${parseInt(n1, 10) * 7 + parseInt(n2, 10)} days`
  );

  // Multi-Line then-Succession ("Simplified task succession", Doku-belegt):
  //   [A] requires 14 days then
  //   [B] requires 4 days then
  //   [C] requires 6 days
  // → normalisiert zu einer Zeile, der nachfolgende Single-Line-Filter splittet sie wieder.
  cleaned = cleaned.replace(/\s+then\s*\n\s*(?=\[)/g, ' then ');

  // Single-Line then-Chaining: `[A] requires 5 days then [B] requires 3 days` → zwei Zeilen
  // (Doku-belegt). Splittet vor jedem `then […]` an Whitespace zu Newline. Greift nicht in
  // String-Literalen, weil `.puml` keine String-Literale mit Spaces+then+`[` enthält.
  cleaned = cleaned.replace(/\s+(?=then\s+\[)/g, '\n');

  // D+n Notation: `[T] starts D+5` / `[T] ends D+15` → konkretes Datum relativ zu
  // `Project starts`. Doku-Beleg: `[Prototype design] starts D+0`, `… ends D+14`.
  // Wir extrahieren `Project starts DATE` aus dem Text (egal wo es steht) und ersetzen
  // dann alle `D+N` Vorkommen. Wenn `Project starts` fehlt UND `D+N`-Notation verwendet
  // wird, geben wir eine dedizierte Warnung aus (nicht nur generic "Keyword ohne Muster").
  const dPlusUsages = (cleaned.match(/\bD\+\d+\b/g) || []).length;
  const psMatch = cleaned.match(/Project\s+starts\s+(\d{4}-\d{2}-\d{2})/i);
  const psMissingForDPlus = dPlusUsages > 0 && !psMatch;
  if (psMatch) {
    const psAnchor = parseDate(psMatch[1]);
    if (psAnchor) {
      cleaned = cleaned.replace(/\bD\+(\d+)\b/g, (_m, n) => dateToISO(addDays(psAnchor, parseInt(n, 10))));
    }
  }

  const lines = cleaned.split('\n').map(l => l.trim());
  const rawItems = [];
  const parseWarnings = [];
  if (psMissingForDPlus) {
    parseWarnings.push({
      lineNum: 0, raw: '',
      reason: `D+n-Notation verwendet (${dPlusUsages} Vorkommen), aber 'Project starts YYYY-MM-DD' fehlt — Anker für D+0 ist nicht definiert.`,
    });
  }
  let title = '';
  let projectStart = null;
  const closedDates    = new Set();
  const closedWeekdays = new Set();
  const openOverrides  = new Set();
  let lastTaskName = null;
  let pendingNoteTarget = null;
  let pendingNoteLines = [];

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];
    const lineNum = i + 1;
    const rawLine = line;
    // Multi-Line-Note: alles bis 'end note' sammeln (vor allem anderen, auch leere Zeilen).
    if (pendingNoteTarget) {
      if (/^end\s+note\s*$/i.test(line)) {
        pendingNoteTarget.note = pendingNoteLines.join('\n');
        pendingNoteTarget = null;
        pendingNoteLines = [];
      } else {
        pendingNoteLines.push(line);
      }
      continue;
    }
    if (!line || /^@|^<style|^<\/style|^skinparam|^scale\b|^printscale\b/i.test(line)) continue;
    try {

    // Alias preprocessing: [Display] as [alias] rest → rewrite to [alias] rest, store label
    let _aliasLabel = null;
    { const am = line.match(/^\[([^\]]+)\]\s+as\s+\[([^\]]+)\]\s+([\s\S]*)/i);
      if (am) { _aliasLabel = am[1].trim(); line = '[' + am[2].trim() + '] ' + am[3].trim(); } }
    // then [Display] as [alias] rest → rewrite to then [alias] rest, store label
    if (!_aliasLabel) {
      const tam = line.match(/^(then\s+)\[([^\]]+)\]\s+as\s+\[([^\]]+)\]\s+([\s\S]*)/i);
      if (tam) { _aliasLabel = tam[2].trim(); line = tam[1] + '[' + tam[3].trim() + '] ' + tam[4].trim(); }
    }
    const push = item => {
      item.sourceLine = lineNum;
      rawItems.push(item);
      if (_aliasLabel) item.label = _aliasLabel;
      return item;
    };

    let m;

    // Code-Kommentar: jedes Apostroph-Präfix wird komplett ignoriert (PlantUML-Konvention).
    if (line.startsWith("'")) continue;

    // Diagramm-Notiz (PlantUML-Standard): `note bottom` + Text-Block + `end note`.
    // Hängt automatisch an das zuletzt definierte Task/Milestone.
    if (/^note\s+bottom\s*$/i.test(line)) {
      pendingNoteTarget = rawItems.findLast(it => it.type === 'task' || it.type === 'milestone');
      pendingNoteLines = [];
      continue;
    }

    // Hyperlink (PlantUML-Standard): `[X] links to [[URL]]` — doppelte eckige Klammern um die URL.
    if ((m = line.match(/^\[([^\]]+)\]\s+links\s+to\s+\[\[([^\]]+)\]\]\s*$/i))) {
      const t = rawItems.findLast(it => (it.name === m[1] || it.label === m[1]) && it.type !== 'dep');
      if (t) t.link = m[2].trim();
      continue;
    }

    // Title
    if ((m = line.match(/^title\s+(.*)/i))) { title = m[1].trim(); continue; }

    // Project starts
    if ((m = line.match(/^[Pp]roject\s+starts?\s+(?:on\s+)?(\d{4}-\d{2}-\d{2})/))) {
      projectStart = parseDate(m[1]); continue;
    }

    // Closed weekday: saturday are closed
    if ((m = line.match(/^(monday|tuesday|wednesday|thursday|friday|saturday|sunday)\s+are?\s+closed/i))) {
      closedWeekdays.add(WEEKDAY_MAP[m[1].toLowerCase()]); continue;
    }

    // Closed date range: 2026-12-24 to 2026-12-26 are closed
    if ((m = line.match(/^(\d{4}-\d{2}-\d{2})\s+to\s+(\d{4}-\d{2}-\d{2})\s+(?:are|is)\s+closed/i))) {
      const from = parseDate(m[1]);
      const to   = parseDate(m[2]);
      if (from && to && from <= to) {
        let cur = new Date(from);
        // Hartes Limit (10 Jahre) gegen pathologische Eingaben.
        for (let n = 0; n <= 3650 && cur <= to; n++) {
          closedDates.add(dateToISO(cur));
          cur = addDays(cur, 1);
        }
      }
      continue;
    }

    // Closed date: 2026-12-25 is closed
    if ((m = line.match(/^(\d{4}-\d{2}-\d{2})\s+is\s+closed/i))) {
      closedDates.add(m[1]); continue;
    }

    // Reopen-Override: 2026-05-23 is open  (überschreibt z. B. "saturday are closed")
    if ((m = line.match(/^(\d{4}-\d{2}-\d{2})\s+is\s+open/i))) {
      openOverrides.add(m[1]);
      closedDates.delete(m[1]); // falls vorher explizit closed gesetzt, ebenfalls aufheben
      continue;
    }

    // Dependency arrow: [A] -> [B]
    if ((m = line.match(/^\[([^\]]+)\]\s*->\s*\[([^\]]+)\]/))) {
      push({ type: 'dep', from: m[1].trim(), to: m[2].trim() }); continue;
    }

    // Color modifier: [Task] is colored in #hex/TextColor
    if ((m = line.match(/^\[([^\]]+)\]\s+is\s+colored\s+in\s+([^\/\s]+)(?:\/(\S+))?/i))) {
      const t = rawItems.findLast(i => i.name === m[1] || i.label === m[1]);
      if (t) { t.barColor = m[2]; t.textColor = m[3] || null; }
      continue;
    }

    // Progress modifier: [Task] is X% completed
    if ((m = line.match(/^\[([^\]]+)\]\s+is\s+(\d+)%\s+completed/i))) {
      const t = rawItems.findLast(i => i.name === m[1] || i.label === m[1]);
      if (t) t.pct = Math.min(100, Math.max(0, +m[2])) / 100;
      continue;
    }

    // Pause modifier (date): [Task] pauses on 2026-06-15
    // Doku-Beleg: [Implementation] pauses on 2018/12/13
    if ((m = line.match(/^\[([^\]]+)\]\s+pauses\s+on\s+(\d{4}-\d{2}-\d{2})/i))) {
      const t = rawItems.findLast(i => i.name === m[1] || i.label === m[1]);
      if (t) { if (!t.pauses) t.pauses = new Set(); t.pauses.add(m[2]); }
      continue;
    }

    // Pause modifier (weekday): [Task] pauses on monday
    // Doku-Beleg: [Implementation] pauses on monday
    if ((m = line.match(/^\[([^\]]+)\]\s+pauses\s+on\s+(monday|tuesday|wednesday|thursday|friday|saturday|sunday)/i))) {
      const t = rawItems.findLast(i => i.name === m[1] || i.label === m[1]);
      if (t) { if (!t.pauseWeekdays) t.pauseWeekdays = new Set(); t.pauseWeekdays.add(WEEKDAY_MAP[m[2].toLowerCase()]); }
      continue;
    }

    // Same-row modifier: [X] displays on same row as [Y]
    // Doku-Beleg: [Test prototype] displays on same row as [Prototype design]
    if ((m = line.match(/^\[([^\]]+)\]\s+displays\s+on\s+same\s+row\s+as\s+\[([^\]]+)\]/i))) {
      const t = rawItems.findLast(i => i.name === m[1] || i.label === m[1]);
      if (t) t.sameRowAs = m[2];
      continue;
    }

    // Subsection: -- Name [2] --
    if ((m = line.match(/^--\s*(.+?)\s+\[2\]\s*--$/))) {
      push({ type: 'subsection', name: m[1], note: null }); continue;
    }

    // Section: -- Name --
    if ((m = line.match(/^--\s*(.+?)\s*--$/))) {
      push({ type: 'section', name: m[1], note: null }); continue;
    }

    // Milestone: [Name] happens DATE
    if ((m = line.match(/^\[([^\]]+)\]\s+happens\s+(\d{4}-\d{2}-\d{2})/))) {
      push({ type: 'milestone', name: m[1], date: parseDate(m[2]), afterTask: null, offset: 0, note: null }); continue;
    }

    // Milestone: [Name] happens at [Other]'s start
    if ((m = line.match(/^\[([^\]]+)\]\s+happens\s+at\s+\[([^\]]+)\]'s\s+start/))) {
      push({ type: 'milestone', name: m[1], date: null, afterTask: m[2], afterWhat: 'start', offset: 0, note: null }); continue;
    }

    // Milestone: [Name] happens at [Other]'s end + OFFSET
    if ((m = line.match(/^\[([^\]]+)\]\s+happens\s+at\s+\[([^\]]+)\]'s\s+end\s*\+\s*(\d+)\s*(days?|weeks?)/i))) {
      push({ type: 'milestone', name: m[1], date: null, afterTask: m[2], offset: parseDuration(m[3], m[4]), note: null }); continue;
    }

    // Milestone: [Name] happens at [Other]'s end
    if ((m = line.match(/^\[([^\]]+)\]\s+happens\s+at\s+\[([^\]]+)\]'s\s+end/))) {
      push({ type: 'milestone', name: m[1], date: null, afterTask: m[2], offset: 0, note: null }); continue;
    }

    // Milestone: [Name] happens on N days/weeks after [Other]'s end
    if ((m = line.match(/^\[([^\]]+)\]\s+happens\s+on\s+(\d+)\s*(days?|weeks?)\s+after\s+\[([^\]]+)\]'s\s+end/i))) {
      push({ type: 'milestone', name: m[1], date: null, afterTask: m[4], offset: parseDuration(m[2], m[3]), note: null, sourceLine: lineNum }); continue;
    }

    // Milestone: [Name] happens on N (working )? days/weeks before [Other]'s start (Backward-Form)
    if ((m = line.match(/^\[([^\]]+)\]\s+happens\s+on\s+(\d+)\s+(working\s+)?(days?|weeks?)\s+before\s+\[([^\]]+)\]'s\s+start/i))) {
      push({ type: 'milestone', name: m[1], date: null, afterTask: m[5], afterWhat: 'start',
        offset: -parseDuration(m[2], m[4]), offsetWorkDays: !!m[3], note: null, sourceLine: lineNum }); continue;
    }

    // Task: [Name] starts DATE and ends DATE
    if ((m = line.match(/^\[([^\]]+)\]\s+starts\s+(\d{4}-\d{2}-\d{2})\s+and\s+ends\s+(\d{4}-\d{2}-\d{2})/))) {
      lastTaskName = m[1];
      push({ type: 'task', name: m[1], start: parseDate(m[2]), end: parseDate(m[3]), duration: null, afterTask: null, note: null }); continue;
    }

    // Task occurs from [M1] to [M2] — Span zwischen zwei Milestones/Tasks
    // Doku-Beleg: [Prototype design] occurs from [P_start] to [P_end]
    if ((m = line.match(/^\[([^\]]+)\]\s+occurs\s+from\s+\[([^\]]+)\]\s+to\s+\[([^\]]+)\]/i))) {
      lastTaskName = m[1];
      push({ type: 'task', name: m[1], start: null, end: null,
        afterTask: m[2], afterWhat: 'start', offset: 0,
        endAfterTask: m[3], endAfterWhat: 'start', endOffset: 0,
        duration: null, note: null, sourceLine: lineNum }); continue;
    }

    // Task: [Name] ends DATE and (lasts|requires) N unit
    // (Rückwärts: End fest, Start = End − Dauer.)
    if ((m = line.match(/^\[([^\]]+)\]\s+ends\s+(\d{4}-\d{2}-\d{2})\s+and\s+(?:lasts|requires)\s+(\d+)\s*(days?|weeks?)/i))) {
      lastTaskName = m[1];
      push({ type: 'task', name: m[1], start: null, end: parseDate(m[2]),
        duration: parseDuration(m[3], m[4]), afterTask: null, note: null, sourceLine: lineNum }); continue;
    }

    // Task: [Name] ends DATE  (Standalone, ohne Start-Constraint)
    // Doku-Beleg: [Prototype design] ends 2020-07-15
    if ((m = line.match(/^\[([^\]]+)\]\s+ends\s+(\d{4}-\d{2}-\d{2})\s*$/))) {
      lastTaskName = m[1];
      push({ type: 'task', name: m[1], start: null, end: parseDate(m[2]),
        duration: 1, afterTask: null, note: null, sourceLine: lineNum }); continue;
    }

    // Task: [Name] starts DATE and lasts|requires N unit
    if ((m = line.match(/^\[([^\]]+)\]\s+starts\s+(\d{4}-\d{2}-\d{2})\s+and\s+(?:lasts|requires)\s+(\d+)\s*(days?|weeks?)/i))) {
      lastTaskName = m[1];
      push({ type: 'task', name: m[1], start: parseDate(m[2]), end: null, duration: parseDuration(m[3], m[4]), afterTask: null, note: null }); continue;
    }

    // Task BACKWARD + END-ANCHOR combined: [Name] starts N (working )? days before [Y]'s start|end and ends at [Y]'s start|end
    // Doku-Beleg (Complex example):
    //   [Init and write tests report] starts 1 day before [Test prototype]'s start and ends at [Test prototype]'s end
    if ((m = line.match(/^\[([^\]]+)\]\s+starts\s+(\d+)\s+(working\s+)?(days?|weeks?)\s+before\s+\[([^\]]+)\]'s\s+(start|end)\s+and\s+ends\s+at\s+\[([^\]]+)\]'s\s+(start|end)/i))) {
      lastTaskName = m[1];
      push({ type: 'task', name: m[1], start: null, end: null,
        afterTask: m[5], afterWhat: m[6], offset: -parseDuration(m[2], m[4]), offsetWorkDays: !!m[3],
        endAfterTask: m[7], endAfterWhat: m[8], endOffset: 0,
        duration: null, note: null, sourceLine: lineNum }); continue;
    }

    // Task BACKWARD + Duration: [Name] starts N (working )? days before [Y]'s start|end and lasts|requires M unit
    if ((m = line.match(/^\[([^\]]+)\]\s+starts\s+(\d+)\s+(working\s+)?(days?|weeks?)\s+before\s+\[([^\]]+)\]'s\s+(start|end)\s+and\s+(?:lasts|requires)\s+(\d+)\s*(days?|weeks?)/i))) {
      lastTaskName = m[1];
      push({ type: 'task', name: m[1], start: null, end: null,
        afterTask: m[5], afterWhat: m[6], offset: -parseDuration(m[2], m[4]), offsetWorkDays: !!m[3],
        duration: parseDuration(m[7], m[8]), note: null, sourceLine: lineNum }); continue;
    }

    // Task BACKWARD only: [Name] starts N (working )? days before [Y]'s start|end
    if ((m = line.match(/^\[([^\]]+)\]\s+starts\s+(\d+)\s+(working\s+)?(days?|weeks?)\s+before\s+\[([^\]]+)\]'s\s+(start|end)/i))) {
      lastTaskName = m[1];
      push({ type: 'task', name: m[1], start: null, end: null,
        afterTask: m[5], afterWhat: m[6], offset: -parseDuration(m[2], m[4]), offsetWorkDays: !!m[3],
        duration: 1, note: null, sourceLine: lineNum }); continue;
    }

    // Task DURATION + END-ANCHOR: [Name] lasts|requires N days and ends at [Y]'s start|end
    // Doku-Beleg: [Write tests] requires 5 days and ends at [Prototype design]'s end
    if ((m = line.match(/^\[([^\]]+)\]\s+(?:lasts|requires)\s+(\d+)\s*(days?|weeks?)\s+and\s+ends\s+at\s+\[([^\]]+)\]'s\s+(start|end)/i))) {
      lastTaskName = m[1];
      push({ type: 'task', name: m[1], start: null, end: null,
        endAfterTask: m[4], endAfterWhat: m[5], endOffset: 0,
        duration: parseDuration(m[2], m[3]), note: null, sourceLine: lineNum }); continue;
    }

    // Task: [Name] lasts|requires N unit (uses projectStart)
    if ((m = line.match(/^\[([^\]]+)\]\s+(?:lasts|requires)\s+(\d+)\s*(days?|weeks?)/i))) {
      lastTaskName = m[1];
      push({ type: 'task', name: m[1], start: projectStart || new Date(), end: null, duration: parseDuration(m[2], m[3]), afterTask: null, note: null }); continue;
    }

    // then [Task] lasts|requires N unit (starts right after previous task)
    if ((m = line.match(/^then\s+\[([^\]]+)\]\s+(?:lasts|requires)\s+(\d+)\s*(days?|weeks?)/i))) {
      const prev = lastTaskName;
      lastTaskName = m[1];
      push({ type: 'task', name: m[1], start: null, end: null,
        afterTask: prev, offset: 0, duration: parseDuration(m[2], m[3]), note: null }); continue;
    }

    // Task: [Name] starts N (working )? days/weeks after [Other]'s end and lasts|requires M unit
    if ((m = line.match(/^\[([^\]]+)\]\s+starts\s+(\d+)\s+(working\s+)?(days?|weeks?)\s+after\s+\[([^\]]+)\]'s\s+end\s+and\s+(?:lasts|requires)\s+(\d+)\s*(days?|weeks?)/i))) {
      lastTaskName = m[1];
      push({ type: 'task', name: m[1], start: null, end: null,
        afterTask: m[5], offset: parseDuration(m[2], m[4]), offsetWorkDays: !!m[3],
        duration: parseDuration(m[6], m[7]), note: null, sourceLine: lineNum }); continue;
    }

    // Task: [Name] starts N (working )? days/weeks after [Other]'s end
    if ((m = line.match(/^\[([^\]]+)\]\s+starts\s+(\d+)\s+(working\s+)?(days?|weeks?)\s+after\s+\[([^\]]+)\]'s\s+end/i))) {
      lastTaskName = m[1];
      push({ type: 'task', name: m[1], start: null, end: null,
        afterTask: m[5], offset: parseDuration(m[2], m[4]), offsetWorkDays: !!m[3],
        duration: 1, note: null, sourceLine: lineNum }); continue;
    }


    // Task: [Name] starts at [Other]'s start + OFFSET and lasts|requires N unit
    if ((m = line.match(/^\[([^\]]+)\]\s+starts\s+at\s+\[([^\]]+)\]'s\s+start\s*\+\s*(\d+)\s*(days?|weeks?)\s+and\s+(?:lasts|requires)\s+(\d+)\s*(days?|weeks?)/i))) {
      lastTaskName = m[1];
      push({ type: 'task', name: m[1], start: null, end: null,
        afterTask: m[2], afterWhat: 'start', offset: parseDuration(m[3], m[4]), duration: parseDuration(m[5], m[6]), note: null }); continue;
    }

    // Task: [Name] starts at [Other]'s start + OFFSET and ends DATE
    if ((m = line.match(/^\[([^\]]+)\]\s+starts\s+at\s+\[([^\]]+)\]'s\s+start\s*\+\s*(\d+)\s*(days?|weeks?)\s+and\s+ends\s+(\d{4}-\d{2}-\d{2})/i))) {
      lastTaskName = m[1];
      push({ type: 'task', name: m[1], start: null, end: parseDate(m[5]),
        afterTask: m[2], afterWhat: 'start', offset: parseDuration(m[3], m[4]), duration: null, note: null }); continue;
    }

    // Task: [Name] starts at [Other]'s start and ends DATE
    if ((m = line.match(/^\[([^\]]+)\]\s+starts\s+at\s+\[([^\]]+)\]'s\s+start\s+and\s+ends\s+(\d{4}-\d{2}-\d{2})/))) {
      lastTaskName = m[1];
      push({ type: 'task', name: m[1], start: null, end: parseDate(m[3]),
        afterTask: m[2], afterWhat: 'start', offset: 0, duration: null, note: null }); continue;
    }

    // Task: [Name] starts at [Other]'s start and lasts|requires N unit
    if ((m = line.match(/^\[([^\]]+)\]\s+starts\s+at\s+\[([^\]]+)\]'s\s+start\s+and\s+(?:lasts|requires)\s+(\d+)\s*(days?|weeks?)/i))) {
      lastTaskName = m[1];
      push({ type: 'task', name: m[1], start: null, end: null,
        afterTask: m[2], afterWhat: 'start', offset: 0, duration: parseDuration(m[3], m[4]), note: null }); continue;
    }

    // Task: [Name] starts at [Other]'s start (no duration)
    if ((m = line.match(/^\[([^\]]+)\]\s+starts\s+at\s+\[([^\]]+)\]'s\s+start/))) {
      lastTaskName = m[1];
      push({ type: 'task', name: m[1], start: null, end: null,
        afterTask: m[2], afterWhat: 'start', offset: 0, duration: 1, note: null }); continue;
    }

    // Task: [Name] starts at [Other]'s end + OFFSET and ends DATE
    if ((m = line.match(/^\[([^\]]+)\]\s+starts\s+at\s+\[([^\]]+)\]'s\s+end\s*\+\s*(\d+)\s*(days?|weeks?)\s+and\s+ends\s+(\d{4}-\d{2}-\d{2})/i))) {
      lastTaskName = m[1];
      push({ type: 'task', name: m[1], start: null, end: parseDate(m[5]),
        afterTask: m[2], offset: parseDuration(m[3], m[4]), duration: null, note: null }); continue;
    }

    // Task: [Name] starts at [Other]'s end + OFFSET and lasts|requires N unit
    if ((m = line.match(/^\[([^\]]+)\]\s+starts\s+at\s+\[([^\]]+)\]'s\s+end\s*\+\s*(\d+)\s*(days?|weeks?)\s+and\s+(?:lasts|requires)\s+(\d+)\s*(days?|weeks?)/i))) {
      lastTaskName = m[1];
      push({ type: 'task', name: m[1], start: null, end: null,
        afterTask: m[2], offset: parseDuration(m[3], m[4]), duration: parseDuration(m[5], m[6]), note: null }); continue;
    }

    // Task: [Name] starts at [Other]'s end and ends DATE
    if ((m = line.match(/^\[([^\]]+)\]\s+starts\s+at\s+\[([^\]]+)\]'s\s+end\s+and\s+ends\s+(\d{4}-\d{2}-\d{2})/))) {
      lastTaskName = m[1];
      push({ type: 'task', name: m[1], start: null, end: parseDate(m[3]),
        afterTask: m[2], offset: 0, duration: null, note: null }); continue;
    }

    // Task: [Name] starts at [Other]'s end and lasts|requires N unit
    if ((m = line.match(/^\[([^\]]+)\]\s+starts\s+at\s+\[([^\]]+)\]'s\s+end\s+and\s+(?:lasts|requires)\s+(\d+)\s*(days?|weeks?)/i))) {
      lastTaskName = m[1];
      push({ type: 'task', name: m[1], start: null, end: null,
        afterTask: m[2], offset: 0, duration: parseDuration(m[3], m[4]), note: null }); continue;
    }

    // Task: [Name] starts at [Other]'s end (no duration → 1 day)
    if ((m = line.match(/^\[([^\]]+)\]\s+starts\s+at\s+\[([^\]]+)\]'s\s+end/))) {
      lastTaskName = m[1];
      push({ type: 'task', name: m[1], start: null, end: null,
        afterTask: m[2], offset: 0, duration: 1, note: null }); continue;
    }

    // Fall-through: kein Pattern hat gegriffen → Heuristik für wahrscheinliche Tippfehler
    const lbr = (line.match(/\[/g) || []).length;
    const rbr = (line.match(/\]/g) || []).length;
    let heuristicMatched = false;
    if (lbr !== rbr) {
      parseWarnings.push({ lineNum, raw: rawLine, reason: 'Eckklammer-Imbalance' });
      heuristicMatched = true;
    } else if (/\d{4}-\d{1,2}-\d{1,2}/.test(line) && !/\b\d{4}-\d{2}-\d{2}\b/.test(line)) {
      parseWarnings.push({ lineNum, raw: rawLine, reason: 'Verdächtiges Datum (YYYY-MM-DD erwartet)' });
      heuristicMatched = true;
    } else if (/\b(starts|ends|lasts|requires|happens)\b/i.test(line)) {
      parseWarnings.push({ lineNum, raw: rawLine, reason: 'Keyword ohne erkanntes Muster' });
      heuristicMatched = true;
    }
    // Dummy-Task einfügen, damit Nachfolger die Referenz noch finden und kontrolliert
    // als "unresolved" enden statt an den Projektanfang zurückzuspringen.
    if (heuristicMatched) {
      const nm = line.match(/^\[([^\]]+)\]/);
      const hasKw = /\b(starts|ends|lasts|requires|happens)\b/i.test(line);
      if (nm && hasKw) {
        rawItems.push({
          type: 'task', name: nm[1].trim(),
          start: null, end: null, afterTask: null, duration: null, note: null,
          parseError: true, sourceLine: lineNum,
        });
      }
    }
    } catch (err) {
      parseWarnings.push({ lineNum, raw: rawLine, reason: 'Parse-Ausnahme: ' + (err.message || err) });
    }
  }

  return { title, projectStart, rawItems, closedDates, closedWeekdays, openOverrides, parseWarnings };
}

// ─── Dependency Resolver ─────────────────────────────────────────────────────

function resolveItems(items, closedDates = new Set(), closedWeekdays = new Set(), openOverrides = new Set()) {
  const map = {};
  for (const it of items) {
    if (it.type === 'task' || it.type === 'milestone') map[it.name] = it;
  }

  // Resolve absolute-start tasks that need end computed from duration
  for (const it of items) {
    if (it.type === 'task' && it.start && !it.end && it.duration != null)
      it.end = addWorkDays(it.start, it.duration, closedDates, closedWeekdays, openOverrides, it.pauses, it.pauseWeekdays);
  }
  // Resolve absolute-end tasks that need start computed from duration (Rückwärts).
  // Tritt auf bei `[T] ends DATE and requires N`, `[T] ends DATE` standalone (duration=1).
  for (const it of items) {
    if (it.type === 'task' && it.end && !it.start && it.duration != null)
      it.start = addWorkDays(it.end, -it.duration, closedDates, closedWeekdays, openOverrides, it.pauses, it.pauseWeekdays);
  }

  // Resolve dependency-based items (multi-pass for chains). Behandelt start-anchor (afterTask)
  // UND end-anchor (endAfterTask) in derselben Schleife — end-anchor + duration kann Start
  // rückwärts berechnen, was wieder andere Items beeinflusst.
  for (let pass = 0; pass < items.length + 2; pass++) {
    let dirty = false;
    for (const it of items) {
      // --- Phase 1: start-anchor (afterTask) ---
      if (it.afterTask && !(it.type === 'milestone' && it.date) && !(it.type === 'task' && it.start)) {
        const dep = map[it.afterTask];
        const depRef = dep ? (dep.type === 'milestone' ? dep.date : (it.afterWhat === 'start' ? dep.start : dep.end)) : null;
        if (!depRef) { dirty = true; }
        else {
          // PlantUML-strict: Offset kalendarisch (addDays), nur "N working days after"
          // setzt offsetWorkDays=true und nutzt addWorkDays. Item-Pausen gelten hier nicht
          // (Pause gehört zum Task, nicht zur Lücke davor).
          const off = it.offset || 0;
          const s = it.offsetWorkDays
            ? addWorkDays(depRef, off, closedDates, closedWeekdays, openOverrides)
            : addDays(depRef, off);
          if (it.type === 'milestone') {
            it.date = s;
          } else {
            it.start = s;
            // Bar-Länge: immer Arbeitstage, item-Pausen relevant.
            if (!it.end && it.duration != null) it.end = addWorkDays(s, it.duration, closedDates, closedWeekdays, openOverrides, it.pauses, it.pauseWeekdays);
          }
        }
      }
      // --- Phase 2: end-anchor (endAfterTask) ---
      if (it.type === 'task' && it.endAfterTask && !it.end) {
        const dep = map[it.endAfterTask];
        const depRef = dep ? (dep.type === 'milestone' ? dep.date : (it.endAfterWhat === 'start' ? dep.start : dep.end)) : null;
        if (!depRef) { dirty = true; }
        else {
          // End-Offset kalendarisch (analog Phase 1). Kein `working`-Capture für end-anchor
          // in der aktuellen Spec — endOffset bleibt strict calendar.
          it.end = addDays(depRef, it.endOffset || 0);
          // Rückwärts-Start aus Dauer wenn start noch unbekannt — Bar-Länge, item-Pausen relevant.
          if (!it.start && it.duration != null) {
            it.start = addWorkDays(it.end, -it.duration, closedDates, closedWeekdays, openOverrides, it.pauses, it.pauseWeekdays);
          }
        }
      }
    }
    if (!dirty) break;
  }
  // Detect circular or missing dependencies
  const unresolved = items.filter(it =>
    it.type !== 'dep' &&
    (it.afterTask || it.endAfterTask) &&
    (it.type === 'milestone' ? !it.date : !it.start)
  );
  if (unresolved.length > 0) {
    items._unresolvedDetails = unresolved.map(i => ({
      name: i.label || i.name,
      afterTask: i.afterTask,
      sourceLine: i.sourceLine || 0,
    }));
    // Cycle-Detection auf den Constraint-Edges der unresolved Items (DFS).
    // Wenn z. B. A.afterTask=B UND B.afterTask=A → expliziter Zyklus-Hinweis statt
    // nur "2 unresolved".
    const byName = {};
    for (const it of items) if (it.name) byName[it.name] = it;
    const visited = new Set();
    const inStack = new Set();
    let cyclePath = null;
    function dfs(name, path) {
      if (cyclePath) return;
      if (inStack.has(name)) {
        const idx = path.indexOf(name);
        cyclePath = path.slice(idx).concat([name]);
        return;
      }
      if (visited.has(name)) return;
      visited.add(name);
      inStack.add(name);
      const it = byName[name];
      if (it) {
        const edges = [];
        if (it.afterTask) edges.push(it.afterTask);
        if (it.endAfterTask) edges.push(it.endAfterTask);
        for (const next of edges) dfs(next, [...path, name]);
      }
      inStack.delete(name);
    }
    for (const u of unresolved) {
      dfs(u.name, []);
      if (cyclePath) break;
    }
    if (cyclePath) items._unresolvedCycle = cyclePath;
  }
  return items;
}

// ─── Critical Path (CPM, Slack=0) ─────────────────────────────────────────────

function computeCriticalPath(rawItems) {
  const nodes = {};
  const order = {};
  rawItems.forEach((it, idx) => {
    if (it.type === 'task' && it.start && it.end) {
      nodes[it.name] = { name: it.name, start: it.start, end: it.end, sourceLine: it.sourceLine || 0 };
      order[it.name] = idx;
    } else if (it.type === 'milestone' && it.date) {
      nodes[it.name] = { name: it.name, start: it.date, end: it.date, sourceLine: it.sourceLine || 0 };
      order[it.name] = idx;
    }
  });
  const names = Object.keys(nodes);
  if (names.length === 0) {
    return { criticalNodes: new Set(), criticalEdges: new Set(), cycleDetected: false };
  }

  const preds = {}, succs = {};
  for (const n of names) { preds[n] = new Set(); succs[n] = new Set(); }
  // Hard edges: stammen aus afterTask, d. h. der Nachfolger verschiebt sich
  // tatsächlich, wenn der Vorgänger sich verzögert (echte Date-Constraint).
  // Soft edges: nur dep-Pfeile oder implizit-temporale Kanten — visualisieren
  // eine logische Reihenfolge, halten aber kein Datum fest.
  const hardEdges = new Set();
  // SS-Edges (Start-Start, also `afterWhat === 'start'`) sind keine FS-Beziehung —
  // der Nachfolger läuft parallel zum Vorgänger. Konflikt-Check ignoriert sie,
  // weil from.end > to.start dort der Normalfall, nicht der Konflikt ist.
  const ssEdges = new Set();
  const addEdge = (from, to, hard = false, ss = false) => {
    if (!nodes[from] || !nodes[to] || from === to) return;
    preds[to].add(from);
    succs[from].add(to);
    const key = from + '→' + to;
    if (hard) hardEdges.add(key);
    if (ss) ssEdges.add(key);
  };
  for (const it of rawItems) {
    if ((it.type === 'task' || it.type === 'milestone') && it.afterTask) {
      addEdge(it.afterTask, it.name, true, it.afterWhat === 'start');
    }
    // End-Anchor: Nachfolger.end gebunden an Vorgänger.start/end. Im CPM-Sinn ist
    // das FF (Finish-Finish), nicht FS — würde als hard FS-Edge falsche Lag-Propagation
    // im Backward-Pass erzeugen. Als soft edge: Nachfolger nicht als isoliert markiert,
    // CP-Berechnung der Hard-Chain bleibt unbeeinflusst.
    if (it.type === 'task' && it.endAfterTask) {
      addEdge(it.endAfterTask, it.name, false);
    }
    if (it.type === 'dep') {
      addEdge(it.from, it.to, false);
    }
  }
  // Snapshot der Knoten, die durch explizite Kanten (afterTask + dep) verbunden sind.
  // Implizit-temporale Kanten zählen für Isolated-Detection nicht — sie sind ein
  // Render-Fallback, kein Beleg für eine logische Abhängigkeit.
  const explicitlyConnected = new Set();
  for (const n of names) {
    if (preds[n].size > 0 || succs[n].size > 0) explicitlyConnected.add(n);
  }
  for (const n of names) {
    if (preds[n].size > 0) continue;
    const t = nodes[n];
    let cand = null;
    for (const a of names) {
      if (a === n) continue;
      const node = nodes[a];
      if (node.end > t.start) continue;
      if (order[a] >= order[n]) continue;
      if (!cand
          || nodes[cand].end < node.end
          || (nodes[cand].end.getTime() === node.end.getTime() && order[cand] < order[a])) {
        cand = a;
      }
    }
    if (cand) addEdge(cand, n);
  }

  let globalStart = nodes[names[0]].start;
  for (const n of names) if (nodes[n].start < globalStart) globalStart = nodes[n].start;
  const ES = {}, EF = {}, dur = {};
  for (const n of names) {
    ES[n] = daysBetween(globalStart, nodes[n].start);
    EF[n] = daysBetween(globalStart, nodes[n].end);
    dur[n] = EF[n] - ES[n];
  }

  const indeg = {};
  for (const n of names) indeg[n] = preds[n].size;
  const queue = names.filter(n => indeg[n] === 0);
  const topo = [];
  while (queue.length) {
    const n = queue.shift();
    topo.push(n);
    for (const s of succs[n]) {
      indeg[s]--;
      if (indeg[s] === 0) queue.push(s);
    }
  }
  if (topo.length < names.length) {
    const topoSet = new Set(topo);
    const cycleDetails = names.filter(n => !topoSet.has(n))
      .map(n => ({ name: n, sourceLine: nodes[n].sourceLine }));
    return { criticalNodes: new Set(), criticalEdges: new Set(), cycleDetected: true, cycleDetails };
  }

  // projectEnd = spätestes EF unter den HARD-EDGE-verbundenen Nodes (afterTask).
  // Soft-only-verbundene Items (dep-Pfeile, End-Anchor, implicit-temporal) sollen
  // projectEnd NICHT treiben — sonst zieht ein isolated-aber-soft-verbundener Task
  // mit spätem Datum die Slack der echten Hard-Chain ins Negative.
  const hardConnected = new Set();
  for (const key of hardEdges) {
    const [hcFrom, hcTo] = key.split('→');
    hardConnected.add(hcFrom); hardConnected.add(hcTo);
  }
  const peScope = [...names].filter(n => hardConnected.has(n));
  const peSource = peScope.length > 0 ? peScope : names;
  let projectEnd = EF[peSource[0]];
  for (const n of peSource) if (EF[n] > projectEnd) projectEnd = EF[n];
  // Lag pro Edge in Kalendertagen. Nur hard edges (afterTask) verschieben
  // den Nachfolger tatsächlich; soft edges (dep-Pfeile, implizit-temporal)
  // gelten als FS mit lag 0 — der Nachfolger reagiert nicht auf eine
  // Verzögerung des Vorgängers, also bekommt der Vorgänger seinen vollen
  // Puffer bis LS[s].
  const edgeLag = {};
  for (const from of names) {
    for (const to of succs[from]) {
      const key = from + '→' + to;
      if (hardEdges.has(key)) {
        // Hard edge: realer Gap im Plan. Bei SS-Beziehungen (afterWhat='start')
        // kann der Gap rechnerisch negativ werden → auf 0 klemmen, weil ein
        // negativer Lag in der Backward-Pass-Formel sinnfrei ist.
        edgeLag[key] = Math.max(0, ES[to] - EF[from]);
      } else {
        edgeLag[key] = 0;
      }
    }
  }
  const LF = {}, LS = {};
  for (let i = topo.length - 1; i >= 0; i--) {
    const n = topo[i];
    // LF[n] = min(LS[s] − lag(n,s)) **nur über hard edges**. Soft edges (dep, implicit-
    // temporal) verschieben den Vorgänger nicht, sind nur visuelle Reihenfolge — wenn
    // ein Task nur soft successors hat (z. B. soft edge zu einem isolated Task), bekommt
    // er den vollen Puffer bis projectEnd. Sonst hätten soft edges zu isolated Tasks
    // die CP-Slack-Berechnung der hard chain zerstört.
    let minVal = Infinity;
    for (const s of succs[n]) {
      const key = n + '→' + s;
      if (!hardEdges.has(key)) continue;
      const lag = edgeLag[key] || 0;
      const val = LS[s] - lag;
      if (val < minVal) minVal = val;
    }
    LF[n] = minVal === Infinity ? projectEnd : minVal;
    LS[n] = LF[n] - dur[n];
  }

  const criticalNodes = new Set();
  for (const n of names) {
    if (Math.abs(LS[n] - ES[n]) < 0.5) criticalNodes.add(n);
  }
  // Isolated Items: ohne explizite Vorgänger und Nachfolger werden sie aus
  // criticalNodes entfernt — „kritisch" ist für isoliert stehende Items irreführend.
  const isolatedItems = [];
  if (names.length > 1) {
    for (const n of names) {
      if (!explicitlyConnected.has(n)) {
        isolatedItems.push({ name: n, sourceLine: nodes[n].sourceLine });
        criticalNodes.delete(n);
      }
    }
  }
  // Plan-Konflikte: FS-Beziehung mit Vorgänger.end > Nachfolger.start ist semantisch
  // absurd (Nachfolger sitzt zeitlich vor Ende des Vorgängers). SS-Beziehungen
  // (`afterWhat === 'start'`) sind keine Konflikte — der Nachfolger läuft dort
  // bewusst parallel.
  const planConflicts = [];
  // Map: name → item (für offset-Check) — Backward-Constraints (`starts N days before`)
  // setzen offset<0 und sind kein Plan-Konflikt, sondern intendiert.
  const itemByName = {};
  for (const it of rawItems) if (it.name) itemByName[it.name] = it;
  for (const from of names) {
    for (const to of succs[from]) {
      const key = from + '→' + to;
      if (ssEdges.has(key)) continue;
      if (!hardEdges.has(key)) continue; // Soft `->`-Arrows sind explizit kein Datums-Constraint
      const toItem = itemByName[to];
      if (toItem && (toItem.offset || 0) < 0) continue; // Backward — bewusst vor end
      if (toItem && toItem.endAfterTask === from) continue; // End-Anchor: Nachfolger läuft parallel zum Vorgänger, endet gemeinsam
      if (nodes[from].end > nodes[to].start) {
        planConflicts.push({
          from, to,
          fromEnd: nodes[from].end,
          toStart: nodes[to].start,
          sourceLine: nodes[to].sourceLine,
        });
      }
    }
  }
  const criticalEdges = new Set();
  for (const from of criticalNodes) {
    for (const to of succs[from]) {
      if (criticalNodes.has(to)) criticalEdges.add(from + '→' + to);
    }
  }
  return { criticalNodes, criticalEdges, cycleDetected: false, cycleDetails: [], isolatedItems, planConflicts };
}

// ─── Time Scale ───────────────────────────────────────────────────────────────

const MONTHS = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
const DOW      = ['So','Mo','Di','Mi','Do','Fr','Sa'];
const DOW_LONG = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];

function isoWeek(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const day = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - day);
  const y1 = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil(((d - y1) / 86400000 + 1) / 7);
}

function getTicks(wStart, wEnd, band, projectStart, genericMode) {
  const totalDays = daysBetween(wStart, wEnd);
  const ticks = [];
  function clip(d) { return Math.max(0, Math.min(totalDays, d)); }
  function push(label, cur, next) {
    const d0 = clip(daysBetween(wStart, cur));
    const d1 = clip(daysBetween(wStart, next));
    if (d1 > d0) ticks.push({ label, d0, d1 });
  }
  if (band === 'week') {
    const weekOf = d => Math.floor(daysBetween(projectStart, d) / 7) + 1;
    const offsetIntoWeek = ((daysBetween(projectStart, wStart) % 7) + 7) % 7;
    let cur = addDays(wStart, -offsetIntoWeek);
    while (cur < wEnd) {
      const next = addDays(cur, 7);
      push('W' + weekOf(cur), cur, next);
      cur = next;
    }
  } else if (band === 'projectday' && projectStart) {
    const dayOf = d => daysBetween(projectStart, d) + 1;
    let cur = new Date(wStart);
    while (cur < wEnd) {
      push('T' + dayOf(cur), cur, addDays(cur, 1));
      cur = addDays(cur, 1);
    }
  } else if (band === 'year') {
    let cur = new Date(wStart.getFullYear(), 0, 1);
    while (cur < wEnd) {
      const next = new Date(cur.getFullYear() + 1, 0, 1);
      push(String(cur.getFullYear()), cur, next);
      cur = next;
    }
  } else if (band === 'quarter') {
    let cur = new Date(wStart.getFullYear(), Math.floor(wStart.getMonth() / 3) * 3, 1);
    while (cur < wEnd) {
      const q = Math.floor(cur.getMonth() / 3);
      const next = new Date(cur.getFullYear(), (q + 1) * 3, 1);
      push('Q' + (q + 1), cur, next);
      cur = next;
    }
  } else if (band === 'month') {
    let cur = new Date(wStart.getFullYear(), wStart.getMonth(), 1);
    while (cur < wEnd) {
      const next = new Date(cur.getFullYear(), cur.getMonth() + 1, 1);
      push(MONTHS[cur.getMonth()], cur, next);
      cur = next;
    }
  } else if (band === 'kw') {
    const dow = wStart.getDay();
    let cur = addDays(wStart, -(dow === 0 ? 6 : dow - 1));
    while (cur < wEnd) {
      const next = addDays(cur, 7);
      push('KW ' + isoWeek(cur), cur, next);
      cur = next;
    }
  } else if (band === 'day') {
    let cur = new Date(wStart);
    while (cur < wEnd) {
      // Im generic-Mode (Jahr 1900 = kein echtes Projektdatum) zeigt das day-Band T+N statt Kalendertag.
      const label = genericMode && projectStart
        ? 'T' + (daysBetween(projectStart, cur) + 1)
        : String(cur.getDate());
      push(label, cur, addDays(cur, 1));
      cur = addDays(cur, 1);
    }
  }
  return ticks;
}

// Wenn `Project starts …` nicht explizit gesetzt ist, leiten wir den Projektanfang aus dem
// frühesten Task-Start (bzw. Milestone-Datum) ab — damit das projectday-Band immer sinnvolle T+N-Werte zeigt.
function inferProjectStart(items) {
  let min = null;
  for (const it of items) {
    const d = it.type === 'task' ? it.start : (it.type === 'milestone' ? it.date : null);
    if (d && (!min || d < min)) min = d;
  }
  return min;
}

// Jahr + Monat immer; Quartal nie mit KW oder Tag; Tag nur < 28 Tage Fenster
function getBands(ppd, totalDays, genericMode) {
  if (genericMode) {
    const showDay = totalDays < 28 || ppd >= 20;
    return { bands: showDay ? ['week', 'day'] : ['week'], showDOW: false };
  }
  const showDay = totalDays < 28 || ppd >= 20;
  const showKW  = ppd >= 5;
  const showQtr = !showKW && totalDays > 90;
  const showDOW = showDay && ppd >= 30;
  const bands = ['year'];
  if (showQtr) bands.push('quarter');
  bands.push('month');
  if (showKW)  bands.push('kw');
  if (showDay) bands.push('day');
  // projectday nur ohne DOW — sonst würde T+N zwischen Datum und Wochentag stehen.
  if (showDay && !showDOW) bands.push('projectday');
  return { bands, showDOW };
}

// ─── SVG Renderer ─────────────────────────────────────────────────────────────

const C = {
  sectionBg: '#1e3a4c', sectionFg: '#fff',
  subsectionBg: '#dce8f2', subsectionFg: '#1e3a4c', subsectionAccent: '#2980b9',
  headerBg1: '#2c6080', headerBg2: '#1e4d66', headerFg: '#fff',
  taskBar: '#2980b9', taskFg: '#fff', taskFgOut: '#1e3a4c',
  milestone: '#c0392b',
  today: '#e74c3c',
  rowBg: '#fff', rowAlt: '#f5f8fb',
  grid: '#dce3e8', sep: '#c5cfd8',
  note: '#999',
};

const LBL_MIN = 200;
const LBL_MAX = 500;
const NOTE_W  = 170;
const ROW_H   = 24;
const SEC_H   = 20;
const SUB_H   = 18;
const BAND_H  = 30;
const BAR_H   = 14;
const BAR_R   = 4;
const FONT    = "'Source Sans 3',system-ui,sans-serif";
const FS      = 12;
const FS_SEC  = 13;

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function approxTextW(s, fs) { return s.length * fs * 0.58; }

function effectiveLabelW(items) {
  let max = LBL_MIN;
  for (const it of items) {
    if (it.type !== 'task' && it.type !== 'milestone') continue;
    const name = it.label || it.name || '';
    const w = approxTextW(name, FS) + 20;
    if (w > max) max = w;
  }
  return Math.min(LBL_MAX, Math.round(max));
}

function contrastColor(hex) {
  const r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
  const lin = c => c <= 0.04045 ? c/12.92 : Math.pow((c+0.055)/1.055, 2.4);
  const L = 0.2126*lin(r) + 0.7152*lin(g) + 0.0722*lin(b);
  return 1.05/(L+0.05) >= (L+0.05)/0.088 ? '#fff' : '#1e3a4c';
}

function buildSVG(parsed, wStart, wEnd, ppd, closedDates = new Set(), closedWeekdays = new Set(), showDeps = false, criticalNodes = new Set(), criticalEdges = new Set(), collapsedSections = new Set(), showNotes = true, openOverrides = new Set()) {
  const items = parsed.rawItems;

  // Direkte Vorgänger/Nachfolger pro Task/Milestone aus afterTask + dep-Pfeilen.
  // Implizit-temporale Edges aus computeCriticalPath bleiben außen vor — die sind
  // nur Render-Fallback, keine logische Abhängigkeit.
  // Mapping vom internen Namen (Alias) zum Display-Label, damit der Tooltip
  // die im Gantt sichtbaren Namen zeigt, nicht den technischen Alias.
  const itemPreds = {}, itemSuccs = {}, itemLabels = {};
  for (const it of items) {
    if (it.type === 'task' || it.type === 'milestone') {
      itemPreds[it.name] = new Map();
      itemSuccs[it.name] = new Map();
      itemLabels[it.name] = it.label || it.name;
    }
  }
  // Edge-Relation als kurzer Suffix für den Tooltip — Offset, working/calendar, SS/FS,
  // Backward, End-Anchor werden sichtbar.
  function edgeRelation(it, anchor /* 'after' | 'endAfter' */) {
    const afterWhat = anchor === 'after' ? it.afterWhat : it.endAfterWhat;
    const offset = anchor === 'after' ? (it.offset || 0) : (it.endOffset || 0);
    const workingDays = anchor === 'after' ? !!it.offsetWorkDays : false; // endOffset hat aktuell keine working-Variante
    const parts = [];
    if (anchor === 'endAfter') {
      parts.push(`ends at ${afterWhat === 'start' ? 'start' : 'end'}`);
    } else if (afterWhat === 'start') {
      parts.push('starts at start');
    }
    if (offset !== 0) {
      const sign = offset > 0 ? '+' : '−';
      const unit = workingDays ? ` working day${Math.abs(offset) === 1 ? '' : 's'}` : ` day${Math.abs(offset) === 1 ? '' : 's'}`;
      parts.push(`${sign} ${Math.abs(offset)}${unit}`);
    }
    return parts.length ? ` (${parts.join(', ')})` : '';
  }
  for (const it of items) {
    if ((it.type === 'task' || it.type === 'milestone') && it.afterTask && itemPreds[it.name] && itemSuccs[it.afterTask]) {
      const rel = edgeRelation(it, 'after');
      itemPreds[it.name].set(it.afterTask, rel);
      itemSuccs[it.afterTask].set(it.name, rel);
    }
    if (it.type === 'task' && it.endAfterTask && itemPreds[it.name] && itemSuccs[it.endAfterTask]) {
      const rel = edgeRelation(it, 'endAfter');
      // Wenn schon afterTask edge auf den gleichen Vorgänger existiert: merge in einer Klammer
      const merge = (existing, add) => {
        if (!existing) return add;
        if (!add) return existing;
        return existing.slice(0, -1) + ', ' + add.slice(2, -1) + ')';
      };
      itemPreds[it.name].set(it.endAfterTask, merge(itemPreds[it.name].get(it.endAfterTask), rel));
      itemSuccs[it.endAfterTask].set(it.name, merge(itemSuccs[it.endAfterTask].get(it.name), rel));
    }
    if (it.type === 'dep' && itemPreds[it.to] && itemSuccs[it.from]) {
      // dep-Pfeil ist soft edge ohne Offset — keine relation-Info
      if (!itemPreds[it.to].has(it.from)) itemPreds[it.to].set(it.from, '');
      if (!itemSuccs[it.from].has(it.to)) itemSuccs[it.from].set(it.to, '');
    }
  }
  // Separator `|` für die data-Attribute, weil Labels Kommas enthalten dürfen.
  const namesToLabels = nameMap => [...nameMap.entries()].map(([n, rel]) => (itemLabels[n] || n) + rel).join('|');

  const totalDays = daysBetween(wStart, wEnd);
  const tlW = totalDays * ppd;
  const hasNotes = showNotes && items.some(i => i.note);
  const noteW = hasNotes ? NOTE_W : 0;
  const labelW = effectiveLabelW(items);

  const genericMode = !!(parsed.projectStart && parsed.projectStart.getFullYear() === 1900);
  // Effektiver Projektanfang: explizit aus der `.puml` oder implizit aus dem frühesten Task/Milestone.
  const effectiveProjectStart = parsed.projectStart || inferProjectStart(items);
  const { bands, showDOW } = getBands(ppd, totalDays, genericMode);
  const showKW  = bands.includes('kw') || bands.includes('week');
  const showDay = bands.includes('day');
  const showQtr = bands.includes('quarter');
  const hdrH = BAND_H * (bands.length + (showDOW ? 1 : 0));

  // Assign y positions (dep items are arrows only — no row)
  // Filter: items unterhalb einer collapsed Section werden ausgeblendet,
  // der Section-Header selbst bleibt sichtbar. Items mit `sameRowAs` werden
  // aus dem vertikalen Layout ausgeschlossen und nach dem Pass als Overlay
  // mit der Y-Position ihres Hosts (= Task auf den sie zeigen) eingefügt.
  let y = hdrH;
  let curSection = null;
  let activeCollapsed = false;
  const rows = items.filter(item => item.type !== 'dep' && !item.sameRowAs).filter(item => {
    if (item.type === 'section') {
      activeCollapsed = collapsedSections.has(item.name);
      return true;
    }
    return !activeCollapsed;
  }).map(item => {
    if (item.type === 'section') curSection = item.name;
    const h = item.type === 'section' ? SEC_H : item.type === 'subsection' ? SUB_H : ROW_H;
    const barCenterY = y + h / 2;
    const row = { ...item, y, h, barCenterY, section: curSection };
    y += h;
    return row;
  });
  // Overlay-Pass: Items mit `sameRowAs` bekommen Y vom Host und werden als Overlay-Row
  // an `rows` angehängt (am Ende, damit sie nach den normalen Bars gerendert werden).
  const rowByName = {};
  for (const r of rows) {
    if (r.name) rowByName[r.name] = r;
    if (r.label) rowByName[r.label] = r;
  }
  for (const item of items) {
    if (item.type === 'dep' || !item.sameRowAs) continue;
    const host = rowByName[item.sameRowAs];
    if (!host) continue; // unresolved sameRowAs — silently ignore
    rows.push({ ...item, y: host.y, h: host.h, barCenterY: host.barCenterY, section: host.section, isOverlay: true });
  }
  const totalH = y;
  const totalW = labelW + tlW + noteW;

  const g = []; // SVG elements

  g.push(`<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="${totalW}" height="${totalH}" data-hdrh="${hdrH}" data-labelw="${labelW}"`,
         ` style="font-family:${FONT};font-size:${FS}px;display:block"`,
         ` text-rendering="geometricPrecision">`);

  // Background
  g.push(`<rect width="${totalW}" height="${totalH}" fill="${C.rowBg}"/>`);

  // Alternating row backgrounds
  let alt = false;
  for (const r of rows) {
    if (r.type === 'section') { alt = false; continue; }
    if (alt) g.push(`<rect x="0" y="${r.y}" width="${totalW}" height="${r.h}" fill="${C.rowAlt}"/>`);
    alt = !alt;
  }

  // Vertical grid lines: daily if showDay, weekly if showKW, else monthly
  {
    let gc, step;
    if (showDay) {
      gc = new Date(wStart); step = 'day';
    } else if (showKW) {
      const dow = wStart.getDay();
      gc = addDays(wStart, -(dow === 0 ? 6 : dow - 1)); step = 'week';
    } else {
      gc = new Date(wStart.getFullYear(), wStart.getMonth(), 1); step = 'month';
    }
    while (gc < wEnd) {
      const d = daysBetween(wStart, gc);
      if (d > 0) {
        const x = labelW + d * ppd;
        g.push(`<line x1="${x}" y1="${hdrH}" x2="${x}" y2="${totalH}" stroke="${C.grid}" stroke-width="1"/>`);
      }
      if (step === 'day')   gc = addDays(gc, 1);
      else if (step === 'week')  gc = addDays(gc, 7);
      else gc = new Date(gc.getFullYear(), gc.getMonth() + 1, 1);
    }
  }

  // Horizontal row separators
  for (const r of rows) {
    if (r.type !== 'section') {
      g.push(`<line x1="0" y1="${r.y + r.h}" x2="${totalW}" y2="${r.y + r.h}" stroke="${C.grid}" stroke-width="0.5"/>`);
    }
  }

  // Column separators
  g.push(`<line x1="${labelW}" y1="0" x2="${labelW}" y2="${totalH}" stroke="${C.sep}" stroke-width="1"/>`);
  g.push(`<line x1="${labelW + tlW}" y1="0" x2="${labelW + tlW}" y2="${totalH}" stroke="${C.sep}" stroke-width="1"/>`);

  // Closed-day shading (only meaningful when ≥3px/day)
  if (ppd >= 3 && (closedDates.size || closedWeekdays.size)) {
    let cur = new Date(wStart);
    while (cur < wEnd) {
      if (isClosedDay(cur, closedDates, closedWeekdays, openOverrides)) {
        const d = daysBetween(wStart, cur);
        const x = labelW + d * ppd;
        g.push(`<rect x="${x}" y="${hdrH}" width="${ppd}" height="${totalH - hdrH}" fill="rgba(0,0,0,0.06)"/>`);
      }
      cur = addDays(cur, 1);
    }
  }

  // Today line
  const today = new Date();
  if (today > wStart && today < wEnd) {
    const tx = labelW + daysBetween(wStart, today) * ppd;
    g.push(`<line x1="${tx}" y1="${hdrH}" x2="${tx}" y2="${totalH}" stroke="${C.today}" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>`);
  }

  // ── Rows ──────────────────────────────────────────────────────────────────

  for (const r of rows) {
    // Bar-Mitte aus dem Layout-Pass übernehmen (siehe barCenterY im rows-Layout).
    const my = r.barCenterY;

    if (r.type === 'section') {
      const isColl = collapsedSections.has(r.name);
      const caret = isColl ? '▶' : '▼';
      g.push(`<g data-section-name="${esc(r.name)}" style="cursor:pointer">`);
      g.push(`<rect x="0" y="${r.y}" width="${totalW}" height="${r.h}" fill="${C.sectionBg}"/>`);
      g.push(`<text x="12" y="${my}" dy="0.35em" fill="${C.sectionFg}"`,
             ` font-weight="700" font-size="${FS_SEC}">${caret}  ${esc(r.name)}</text>`);
      g.push(`</g>`);
      continue;
    }

    if (r.type === 'subsection') {
      g.push(`<rect x="0" y="${r.y}" width="${totalW}" height="${r.h}" fill="${C.subsectionBg}"/>`);
      g.push(`<rect x="0" y="${r.y}" width="3" height="${r.h}" fill="${C.subsectionAccent}"/>`);
      g.push(`<text x="16" y="${my}" dy="0.35em" fill="${C.subsectionFg}"`,
             ` font-weight="600" font-size="${FS}">${esc(r.name)}</text>`);
      g.push(`<line x1="0" y1="${r.y + r.h}" x2="${totalW}" y2="${r.y + r.h}" stroke="${C.sep}" stroke-width="0.5"/>`);
      continue;
    }

    // Label column (right-aligned). If the item has a hyperlink (`[X] links to [[URL]]`),
    // wrap the label in an SVG <a> with target="_blank" and add an underline cue.
    // Overlay-Rows (displays on same row as): kein eigenes Label, Host-Label bleibt.
    const displayName = r.label || r.name;
    const linkOpen  = r.link ? `<a xlink:href="${esc(r.link)}" target="_blank">` : '';
    const linkClose = r.link ? `</a>` : '';
    const linkStyle = r.link ? ' style="cursor:pointer;text-decoration:underline"' : '';
    if (!r.isOverlay) {
      g.push(linkOpen);
      g.push(`<text x="${labelW - 10}" y="${my}" dy="0.35em" text-anchor="end"`,
             ` fill="${C.taskFgOut}" font-size="${FS}"${linkStyle}>${esc(displayName)}</text>`);
      g.push(linkClose);
    }

    if (r.type === 'task') {
      if (r.parseError) {
        // Dummy-Task: keine Bar, aber sichtbarer Hinweis auf der Bar-Spur
        g.push(`<rect x="${labelW}" y="${r.y}" width="${tlW}" height="${r.h}" fill="rgba(192,57,43,0.06)"/>`);
        g.push(`<text x="${labelW + 6}" y="${my}" dy="0.35em" fill="#c0392b" font-size="${FS}" font-weight="600">⚠ Syntaxfehler in Zeile ${r.sourceLine}</text>`);
        continue;
      }
      if (!r.start || !r.end) continue;
      const sd = daysBetween(wStart, r.start);
      const ed = daysBetween(wStart, r.end);
      const sd2 = Math.max(0, sd);
      const ed2 = Math.min(totalDays, ed);

      if (sd2 < ed2) {
        const bx = labelW + sd2 * ppd;
        const bw = (ed2 - sd2) * ppd;
        const by = my - BAR_H / 2;

        const barFill = r.barColor || C.taskBar;
        const barFg   = r.textColor || contrastColor(barFill);

        const noteAttr = r.note ? ` data-note="${esc(r.note)}"` : '';
        const barStyle = r.link ? ' style="cursor:pointer"' : '';
        g.push(linkOpen);
        const pctAttr = r.pct > 0 ? ` data-pct="${Math.round(r.pct * 100)}"` : '';
        const predsStr = itemPreds[r.name] ? namesToLabels(itemPreds[r.name]) : '';
        const succsStr = itemSuccs[r.name] ? namesToLabels(itemSuccs[r.name]) : '';
        const predsAttr = predsStr ? ` data-preds="${esc(predsStr)}"` : '';
        const succsAttr = succsStr ? ` data-succs="${esc(succsStr)}"` : '';
        g.push(`<g data-name="${esc(displayName)}" data-start="${dateToISO(r.start)}" data-end="${dateToISO(r.end)}" data-section="${esc(r.section || '')}"${noteAttr}${barStyle}${pctAttr}${predsAttr}${succsAttr}>`);
        g.push(`<rect x="${bx}" y="${by}" width="${bw}" height="${BAR_H}" rx="${BAR_R}" fill="${barFill}"/>`);

        // Progress overlay
        if (r.pct > 0) {
          const pw = bw * r.pct;
          g.push(`<rect x="${bx}" y="${by}" width="${pw}" height="${BAR_H}" rx="${BAR_R}" fill="rgba(0,0,0,0.25)"/>`);
          if (pw >= BAR_R && pw < bw - BAR_R)
            g.push(`<rect x="${bx + pw - BAR_R}" y="${by}" width="${BAR_R}" height="${BAR_H}" fill="rgba(0,0,0,0.25)"/>`);
        }

        // Clip indicators
        if (sd < 0)
          g.push(`<polygon points="${bx},${by} ${bx+7},${by+BAR_H/2} ${bx},${by+BAR_H}" fill="#fff" opacity="0.4"/>`);
        if (ed > totalDays)
          g.push(`<polygon points="${bx+bw},${by} ${bx+bw-7},${by+BAR_H/2} ${bx+bw},${by+BAR_H}" fill="#fff" opacity="0.4"/>`);

        // Label: inside if fits, else right of bar
        const tw = approxTextW(displayName, FS);
        const labelInside = tw + 10 < bw;
        let labelEndX = bx + bw;
        if (labelInside) {
          g.push(`<text x="${bx + bw/2}" y="${my}" dy="0.35em" text-anchor="middle"`,
                 ` fill="${barFg}" font-size="${FS}" font-weight="700">${esc(displayName)}</text>`);
        } else {
          const lx = Math.min(bx + bw + 5, labelW + tlW - 4);
          g.push(`<text x="${lx}" y="${my}" dy="0.35em"`,
                 ` fill="${C.taskFgOut}" font-size="${FS}" font-weight="700">${esc(displayName)}</text>`);
          labelEndX = lx + tw;
        }

        // Critical frame zuletzt — umschließt Bar + ggf. outer label
        if (criticalNodes.has(r.name)) {
          const fX = bx - 2;
          const fW = Math.max(bw + 4, labelEndX + 2 - fX);
          g.push(`<rect x="${fX}" y="${by - 2}" width="${fW}" height="${BAR_H + 4}" rx="${BAR_R + 1}" fill="none" stroke="#c0392b" stroke-width="1.5"/>`);
        }

        g.push(`</g>`);
        g.push(linkClose);
      }

    } else if (r.type === 'milestone') {
      if (!r.date) continue;
      const md = daysBetween(wStart, r.date);
      const sz = 9;
      const szDays = sz / ppd;
      if (md >= -szDays && md <= totalDays + szDays) {
        const mx = labelW + md * ppd;
        const noteAttrMS = r.note ? ` data-note="${esc(r.note)}"` : '';
        const msStyle = r.link ? ' style="cursor:pointer"' : '';
        const msPredsStr = itemPreds[r.name] ? namesToLabels(itemPreds[r.name]) : '';
        const msSuccsStr = itemSuccs[r.name] ? namesToLabels(itemSuccs[r.name]) : '';
        const msPredsAttr = msPredsStr ? ` data-preds="${esc(msPredsStr)}"` : '';
        const msSuccsAttr = msSuccsStr ? ` data-succs="${esc(msSuccsStr)}"` : '';
        g.push(linkOpen);
        g.push(`<g data-name="${esc(displayName)}" data-ms="${dateToISO(r.date)}" data-section="${esc(r.section || '')}"${noteAttrMS}${msStyle}${msPredsAttr}${msSuccsAttr}>`);
        g.push(`<polygon points="${mx},${my-sz} ${mx+sz},${my} ${mx},${my+sz} ${mx-sz},${my}"`,
               ` fill="${C.milestone}"/>`);
        if (criticalNodes.has(r.name)) {
          const oz = sz + 3;
          g.push(`<polygon points="${mx},${my-oz} ${mx+oz},${my} ${mx},${my+oz} ${mx-oz},${my}"`,
                 ` fill="none" stroke="#c0392b" stroke-width="1.5"/>`);
        }
        g.push(`<text x="${mx + sz + 5}" y="${my}" dy="0.35em"`,
               ` fill="${C.taskFgOut}" font-size="${FS}" font-weight="600">${esc(displayName)}</text>`);
        g.push(`</g>`);
        g.push(linkClose);
      }
    }

    // Notiz -- erste Zeile als Vorschau in der rechten Notiz-Spalte.
    if (hasNotes && r.note) {
      const maxNoteW = NOTE_W - 20;
      const isMultiline = r.note.includes('\n');
      const firstLine = isMultiline ? r.note.split('\n')[0] : r.note;
      let noteText = firstLine;
      while (noteText.length > 1 && approxTextW(noteText, FS) > maxNoteW) noteText = noteText.slice(0, -1);
      const truncated = (noteText !== firstLine);
      if (truncated) noteText = noteText.slice(0, -1) + '…';
      else if (isMultiline) noteText = noteText + ' …';
      g.push(`<text x="${labelW + tlW + 10}" y="${my}" dy="0.35em"`,
             ` fill="${C.note}" font-size="${FS}">${esc(noteText)}</text>`);
    }
  }

  // ── Dependency arrows ─────────────────────────────────────────────────────

  if (showDeps) {
    const rowMap = {};
    for (const r of rows) {
      if (r.type === 'task' || r.type === 'milestone') rowMap[r.name] = r;
    }
    const ARW = 6; // arrowhead size
    for (const dep of items.filter(i => i.type === 'dep')) {
      const rA = rowMap[dep.from], rB = rowMap[dep.to];
      if (!rA || !rB) continue;
      if (rA.type === 'task' && (!rA.start || !rA.end)) continue;
      if (rB.type === 'task' && (!rB.start || !rB.end)) continue;

      const startDateA = rA.type === 'milestone' ? rA.date : rA.start;
      const endDateA   = rA.type === 'milestone' ? rA.date : rA.end;
      const startDateB = rB.type === 'milestone' ? rB.date : rB.start;
      if (!startDateA || !endDateA || !startDateB) continue;

      const sdA = daysBetween(wStart, startDateA);
      const edA = daysBetween(wStart, endDateA);
      const sdB = daysBetween(wStart, startDateB);

      // Skip if source bar is entirely outside window, or target starts after window
      if (edA < 0 || sdA > totalDays || sdB > totalDays) continue;

      // Start: above or below bar A depending on whether B is above or below A. Nutzt barCenterY,
      // damit Pfeile auch bei interner Notiz (top/bottom) exakt an der Bar-Mitte ansetzen.
      const topY_A = rA.barCenterY - BAR_H / 2 - 2;
      const botY_A = rA.barCenterY + BAR_H / 2 + 2;
      const midY_B = rB.barCenterY;
      const startY = midY_B < rA.barCenterY ? topY_A : botY_A;

      const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
      const midX_A = labelW + clamp((sdA + edA) / 2, 0, totalDays) * ppd;
      const x2     = labelW + clamp(sdB, 0, totalDays) * ppd;

      // Path: from top or bottom center of A → across to bar B midpoint
      const path = `M ${midX_A} ${startY} V ${midY_B} H ${x2}`;
      const isCritEdge = criticalEdges.has(dep.from + '→' + dep.to);
      const depColor = isCritEdge ? '#c0392b' : '#888';
      const depWidth = isCritEdge ? '1.6' : '1.2';
      g.push(`<path d="${path}" fill="none" stroke="${depColor}" stroke-width="${depWidth}" stroke-linejoin="round"/>`);

      // Arrowhead pointing right into bar B center
      g.push(`<polygon points="${x2},${midY_B} ${x2 - ARW},${midY_B - ARW/2} ${x2 - ARW},${midY_B + ARW/2}" fill="${depColor}"/>`);
    }
  }

  // ── Header (drawn last = on top) ──────────────────────────────────────────

  g.push('<rect x="0" y="0" width="' + totalW + '" height="' + hdrH + '" fill="' + C.headerBg1 + '"/>');

  // Render each band in order (top to bottom)
  const bandFontSize = { year: 13, quarter: 12, month: 12, kw: 11, day: 11, week: 11, projectday: 10 };
  const bandFontWeight = { year: '700', quarter: '600', month: '600', kw: '600', day: '600', week: '600', projectday: '500' };
  const bandMinW = { year: 28, quarter: 24, month: 14, kw: 18, day: 10, week: 18, projectday: 14 };

  for (let bi = 0; bi < bands.length; bi++) {
    const bName = bands[bi];
    const by = BAND_H * bi;
    const fs = bandFontSize[bName];
    const fw = bandFontWeight[bName];
    const minW = bandMinW[bName];
    const ticks = getTicks(wStart, wEnd, bName, effectiveProjectStart, genericMode);
    for (let i = 0; i < ticks.length; i++) {
      const t = ticks[i];
      const x = labelW + t.d0 * ppd, w = (t.d1 - t.d0) * ppd;
      if (i % 2 === 1) g.push('<rect x="' + x + '" y="' + by + '" width="' + w + '" height="' + BAND_H + '" fill="' + C.headerBg2 + '"/>');
      g.push('<line x1="' + x + '" y1="' + by + '" x2="' + x + '" y2="' + (by + BAND_H) + '" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>');
      if (w > minW) {
        // Year-Band wiederholt das Label alle ~500 px, damit beim Reinzoomen + horizontalem Scrollen die Jahreszahl immer im Sichtfenster bleibt.
        const repeat = (bName === 'year') ? Math.max(1, Math.floor(w / 500)) : 1;
        for (let k = 0; k < repeat; k++) {
          const lx = Math.round(x + w * (k + 0.5) / repeat);
          g.push('<text x="' + lx + '" y="' + (by + BAND_H/2) + '" dy="0.35em" text-anchor="middle" fill="' + C.headerFg + '" font-weight="' + fw + '" font-size="' + fs + '">' + esc(t.label) + '</text>');
        }
      }
    }
  }

  // DOW band — one cell per day, date + weekday
  if (showDOW) {
    const by = BAND_H * bands.length;
    let cur = new Date(wStart);
    while (cur < wEnd) {
      const d = daysBetween(wStart, cur);
      const x = labelW + d * ppd;
      const wd = cur.getDay();
      const isWeekend = wd === 0 || wd === 6;
      const bg = isWeekend ? 'rgba(0,0,0,0.20)' : d % 2 === 0 ? 'rgba(0,0,0,0.06)' : 'transparent';
      g.push('<rect x="' + x + '" y="' + by + '" width="' + ppd + '" height="' + BAND_H + '" fill="' + bg + '"/>');
      g.push('<line x1="' + x + '" y1="' + by + '" x2="' + x + '" y2="' + hdrH + '" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>');
      const cy = by + BAND_H / 2;
      g.push('<text x="' + Math.round(x + ppd/2) + '" y="' + cy + '" dy="0.35em" text-anchor="middle" fill="' + C.headerFg + '" font-size="11" opacity="0.9">' + DOW[wd] + '</text>');
      cur = addDays(cur, 1);
    }
  }

  // Label column header
  g.push('<rect x="0" y="0" width="' + labelW + '" height="' + hdrH + '" fill="' + C.headerBg1 + '"/>');
  if (parsed.title) {
    g.push('<text x="' + (labelW/2) + '" y="' + (hdrH/2) + '" dy="0.35em" text-anchor="middle" fill="' + C.headerFg + '" font-weight="700" font-size="13">' + esc(parsed.title) + '</text>');
  }

  // Notes column header
  if (hasNotes) {
    g.push('<rect x="' + (labelW+tlW) + '" y="0" width="' + noteW + '" height="' + hdrH + '" fill="' + C.headerBg1 + '"/>');
    g.push('<text x="' + (labelW+tlW+noteW/2) + '" y="' + (hdrH/2) + '" dy="0.35em" text-anchor="middle" fill="' + C.headerFg + '" font-weight="700" font-size="11">Notizen</text>');
  }

  // Header bottom border
  g.push('<line x1="0" y1="' + hdrH + '" x2="' + totalW + '" y2="' + hdrH + '" stroke="' + C.sep + '" stroke-width="1"/>');

  g.push('</svg>');
  return g.join('');
}

// ─── App State & Logic ────────────────────────────────────────────────────────

const state = {
  parsed: null, wStart: null, wEnd: null, ppd: null,
  cp: { criticalNodes: new Set(), criticalEdges: new Set(), cycleDetected: false },
  fitMode: false,
  collapsedSections: new Set(),
  windowMode: 'auto',          // 'auto' | 'manual'
};

function autoWindow(items) {
  let lo = null, hi = null;
  for (const it of items) {
    const dates = it.type === 'milestone' ? [it.date] : [it.start, it.end];
    for (const d of dates) {
      if (!d) continue;
      if (!lo || d < lo) lo = d;
      if (!hi || d > hi) hi = d;
    }
  }
  if (!lo) { lo = new Date(); hi = addDays(lo, 90); }
  return { start: addDays(lo, -7), end: addDays(hi, 14) };
}

function autoZoom(wStart, wEnd, items) {
  const w = document.getElementById('svg-wrap').clientWidth || 900;
  const days = daysBetween(wStart, wEnd);
  const labelW = effectiveLabelW(items || []);
  // Note-Spalte einbeziehen — sonst landet sie außerhalb des sichtbaren Bereichs (Bug bis v26.5.42).
  const hasNotes = (items || []).some(i => i && i.note);
  const showNotesEl = document.getElementById('chk-notes');
  const showNotes = showNotesEl ? showNotesEl.checked : true;
  const noteW = (showNotes && hasNotes) ? NOTE_W : 0;
  return Math.min(200, Math.max(0.5, (w - labelW - noteW - 40) / days));
}

function applyFit() {
  if (!state.parsed || !state.wStart || !state.wEnd) return;
  const days = daysBetween(state.wStart, state.wEnd);
  const showNotes = document.getElementById('chk-notes').checked;
  const noteW = (showNotes && state.parsed.rawItems.some(i => i.note)) ? NOTE_W : 0;
  const labelW = effectiveLabelW(state.parsed.rawItems);
  const wrap = document.getElementById('svg-wrap');
  const avail = (wrap.clientWidth || 900) - labelW - noteW - 16; // 16px Padding-Reserve
  const ppd = days > 0 ? avail / days : 200;
  state.ppd = Math.min(200, Math.max(0.2, ppd));
  render();
}

function fitToPage() {
  if (!state.parsed) return;
  state.windowMode = 'auto';
  const { start, end } = autoWindow(state.parsed.rawItems);
  state.wStart = start;
  state.wEnd = end;
  setDateInputs(start, end);
  state.fitMode = true;
  applyFit();
}

function setDateInputs(s, e) {
  document.getElementById('date-from').value = dateToISO(s);
  document.getElementById('date-to').value   = dateToISO(e);
}

function render() {
  if (!state.parsed || !state.wStart || !state.wEnd || !state.ppd) return;
  let svg;
  try {
    const showMS    = document.getElementById('chk-milestones').checked;
    const showNotes = document.getElementById('chk-notes').checked;
    const showDeps  = document.getElementById('chk-deps').checked;
    const showCrit  = document.getElementById('chk-critical').checked;
